<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HueBit OS</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#5b8af5;--accent2:#9b59f5;
  --text:#eaf0ff;--text-dim:rgba(255,255,255,0.45);
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Cascadia Code','Consolas','Courier New',monospace;
  --radius:14px;--taskbar-h:60px;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);color:var(--text);background:#040608;user-select:none}
::selection{background:rgba(91,138,245,0.4)}
*::-webkit-scrollbar{width:5px;height:5px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.3)}


#desktop{position:fixed;inset:0;overflow:hidden}
#wallpaper{position:absolute;inset:0;background-image:url('./public/wallpaper.png');background-size:cover;background-position:center;transition:all 0.8s ease}
#wallpaper-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.15);pointer-events:none}
#aurora{position:absolute;inset:0;pointer-events:none}
#aurora::before,#aurora::after{content:'';position:absolute;border-radius:50%;filter:blur(100px);mix-blend-mode:screen}
#aurora::before{width:60vw;height:50vh;background:radial-gradient(circle,rgba(91,138,245,0.14) 0%,transparent 70%);top:-10%;left:-5%;animation:aA 14s ease-in-out infinite alternate}
#aurora::after{width:50vw;height:60vh;background:radial-gradient(circle,rgba(155,89,245,0.11) 0%,transparent 70%);bottom:8%;right:-5%;animation:aB 16s ease-in-out infinite alternate}
@keyframes aA{0%{transform:translate(0,0)scale(1)}100%{transform:translate(4%,7%)scale(1.06)}}
@keyframes aB{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-3%,4%)scale(0.96)}}
#stars-canvas{position:absolute;inset:0;pointer-events:none;opacity:0.6}

.desk-icon{position:absolute;width:80px;text-align:center;cursor:pointer;padding:8px 4px 10px;border-radius:12px;border:1px solid transparent;transition:background .15s,border-color .15s,transform .2s cubic-bezier(.2,1.2,.3,1)}
.desk-icon:hover{background:rgba(255,255,255,0.09);transform:translateY(-3px)scale(1.05)}
.desk-icon.selected{background:rgba(91,138,245,0.2);border-color:rgba(91,138,245,0.5)}
.desk-icon .di-img{width:52px;height:52px;display:block;margin:0 auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.55));transition:filter .2s}
.desk-icon:hover .di-img{filter:drop-shadow(0 6px 18px rgba(0,0,0,0.7))}
.desk-icon .di-img svg,.desk-icon .di-img img{width:52px;height:52px}
.desk-icon span{display:block;margin-top:5px;font-size:12px;font-weight:500;color:#fff;text-shadow:0 1px 7px rgba(0,0,0,0.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#drop-zone{position:fixed;inset:0;z-index:7000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s ease}
#drop-zone.show{opacity:1;pointer-events:auto}
.dz-box{border:2px dashed rgba(91,138,245,0.7);border-radius:22px;padding:50px 70px;text-align:center;background:rgba(91,138,245,0.08);animation:dzPulse 2s ease-in-out infinite}
@keyframes dzPulse{0%,100%{border-color:rgba(91,138,245,0.5)}50%{border-color:rgba(91,138,245,0.9)}}
.dz-ico{font-size:52px;margin-bottom:14px}
.dz-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.dz-sub{font-size:13px;color:rgba(255,255,255,0.5)}

.window{position:fixed;display:flex;flex-direction:column;background:rgba(12,14,24,0.9);backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.1);box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.04) inset;overflow:hidden;will-change:transform;min-width:300px;min-height:200px}
.window.focused{border-color:rgba(91,138,245,0.3);box-shadow:0 36px 90px rgba(0,0,0,0.7),0 0 0 1px rgba(91,138,245,0.2),0 0 0 0.5px rgba(255,255,255,0.06) inset}
.window.maximized{border-radius:0!important;border:none!important}
.win-titlebar{height:42px;min-height:42px;display:flex;align-items:center;gap:8px;padding:0 10px 0 12px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07);cursor:grab;flex-shrink:0}
.win-titlebar:active{cursor:grabbing}
.window:not(.focused) .win-titlebar{opacity:0.75}
.traffic{display:flex;gap:7px;flex-shrink:0}
.tb{width:13px;height:13px;border-radius:50%;cursor:pointer;border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0;transition:all .15s;outline:none}
.tb:hover{filter:brightness(1.15);font-size:7px;color:rgba(0,0,0,0.55)}
.tb.cl{background:#ff5f57}.tb.cl::after{content:'✕'}
.tb.mn{background:#ffbd2e}.tb.mn::after{content:'–'}
.tb.mx{background:#28c840}.tb.mx::after{content:'⤢'}
.win-title{flex:1;text-align:center;font-size:13px;font-weight:600;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.win-icon-sm{width:17px;height:17px;flex-shrink:0;opacity:0.8;pointer-events:none;display:flex;align-items:center}
.win-icon-sm img,.win-icon-sm svg{width:17px;height:17px}
.win-body{flex:1;overflow:hidden;position:relative;min-height:0}
.rh{position:absolute;z-index:10}
.rh.n{top:0;left:8px;right:8px;height:5px;cursor:n-resize}
.rh.s{bottom:0;left:8px;right:8px;height:5px;cursor:s-resize}
.rh.e{right:0;top:8px;bottom:8px;width:5px;cursor:e-resize}
.rh.w{left:0;top:8px;bottom:8px;width:5px;cursor:w-resize}
.rh.se{bottom:0;right:0;width:15px;height:15px;cursor:se-resize}
.rh.sw{bottom:0;left:0;width:15px;height:15px;cursor:sw-resize}
.rh.ne{top:0;right:0;width:15px;height:15px;cursor:ne-resize}
.rh.nw{top:0;left:0;width:15px;height:15px;cursor:nw-resize}

#tb-wrap{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:800}
#taskbar{height:var(--taskbar-h);display:flex;align-items:center;gap:4px;padding:0 14px;background:rgba(10,12,22,0.9);backdrop-filter:blur(30px) saturate(2);-webkit-backdrop-filter:blur(30px) saturate(2);border-radius:22px;border:1px solid rgba(255,255,255,0.14);box-shadow:0 14px 44px rgba(0,0,0,0.55),0 1px 0 rgba(255,255,255,0.07) inset}
.tb-div{width:1px;height:28px;background:rgba(255,255,255,0.1);margin:0 4px;flex-shrink:0}
#start-btn{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);transition:all .22s cubic-bezier(.2,1.2,.3,1);overflow:hidden}
#start-btn:hover{background:rgba(91,138,245,0.22);transform:translateY(-4px)scale(1.08);border-color:rgba(91,138,245,0.4)}
#start-btn img{width:28px;height:28px}
#start-btn .sb-fb{font-size:22px;display:none}
#tb-apps{display:flex;gap:4px;align-items:center}
.tb-app{width:44px;height:44px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s cubic-bezier(.2,1.4,.3,1);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)}
.tb-app:hover{transform:translateY(-5px)scale(1.11);background:rgba(255,255,255,0.11)}
.tb-app:active{transform:translateY(-2px)scale(0.97)}
.tb-app img,.tb-app svg{width:28px;height:28px}
.tb-dot{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent);display:none}
.tb-app.open .tb-dot{display:block}
.tb-app.active .tb-dot{background:#fff;width:6px;height:6px}
.tb-tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:rgba(12,15,28,0.98);border:1px solid rgba(255,255,255,0.1);padding:5px 10px;border-radius:8px;font-size:12px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 5px 15px rgba(0,0,0,0.45)}
.tb-app:hover .tb-tip{opacity:1}
#sys-tray{display:flex;align-items:center;gap:6px;padding:0 2px}
#clock-tray{font-size:12px;font-weight:600;color:rgba(255,255,255,0.88);cursor:default;text-align:center;line-height:1.45}
.tray-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;opacity:0.65;font-size:14px;cursor:pointer;transition:opacity .15s;border-radius:7px}
.tray-ico:hover{opacity:1;background:rgba(255,255,255,0.1)}

#start-menu{position:fixed;bottom:82px;left:50%;transform:translateX(-50%)scale(0.93)translateY(18px);width:520px;background:rgba(9,11,22,0.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:20px;border:1px solid rgba(255,255,255,0.12);box-shadow:0 40px 100px rgba(0,0,0,0.8);z-index:750;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.2,1.2,.3,1);overflow:hidden}
#start-menu.open{opacity:1;pointer-events:auto;transform:translateX(-50%)scale(1)translateY(0)}
.sm-search{margin:16px 16px 12px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:10px 14px}
.sm-search input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;font-family:var(--font)}
.sm-search input::placeholder{color:rgba(255,255,255,0.35)}
.sm-label{padding:0 16px 8px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em}
.sm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:0 10px 10px}
.sm-item{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 6px;border-radius:12px;cursor:pointer;transition:background .13s;text-align:center}
.sm-item:hover{background:rgba(255,255,255,0.08)}
.sm-item:active{transform:scale(0.96)}
.sm-item .si-img{width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.sm-item .si-img img,.sm-item .si-img svg{width:36px;height:36px}
.sm-item span{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8)}
.sm-footer{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.07)}
.sm-user{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.sm-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px}
.sm-btns{display:flex;gap:6px}
.sm-btn{width:30px;height:30px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;color:rgba(255,255,255,0.65)}
.sm-btn:hover{background:rgba(255,90,90,0.22);color:#ff9090;border-color:rgba(255,90,90,0.3)}

#ctx{position:fixed;z-index:9999;background:rgba(10,12,24,0.99);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.13);border-radius:12px;padding:6px;min-width:190px;box-shadow:0 22px 65px rgba(0,0,0,0.7);opacity:0;transform:scale(0.9)translateY(-8px);transition:opacity .15s ease,transform .17s cubic-bezier(.2,1.2,.3,1);display:none}
#ctx.show{opacity:1;transform:scale(1)translateY(0)}
.ctx-item{padding:9px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.82);transition:all .1s}
.ctx-item:hover{background:rgba(91,138,245,0.18);color:#fff;padding-left:16px}
.ctx-item.danger:hover{background:rgba(255,80,80,0.18);color:#ff9090}
.ctx-sep{height:1px;background:rgba(255,255,255,0.08);margin:4px 0}

#toasts{position:fixed;top:14px;right:14px;z-index:9990;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(10,12,22,0.97);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-left:3px solid var(--accent);border-radius:12px;padding:11px 14px;min-width:250px;max-width:310px;box-shadow:0 10px 32px rgba(0,0,0,0.45);display:flex;gap:11px;align-items:flex-start;pointer-events:auto;animation:toastIn .38s cubic-bezier(.2,1.2,.3,1) forwards;cursor:pointer}
.toast.out{animation:toastOut .22s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)scale(0.94)}to{opacity:1;transform:translateX(0)scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)scale(1)}to{opacity:0;transform:translateX(40px)scale(0.95)}}
.toast-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.toast-title{font-size:13px;font-weight:700;margin-bottom:2px}
.toast-msg{font-size:12px;color:rgba(255,255,255,0.5)}

.save-overlay{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.save-modal{width:440px;background:rgba(12,14,24,0.98);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.13);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,0.7);overflow:hidden;animation:saveIn .28s cubic-bezier(.2,1.2,.3,1)}
@keyframes saveIn{from{opacity:0;transform:scale(0.92)translateY(14px)}to{opacity:1;transform:scale(1)translateY(0)}}
.save-modal-hd{padding:16px 18px 12px;font-size:14px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.07)}
.save-modal-body{padding:14px 18px}
.save-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.save-folders{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.save-folder-btn{padding:6px 13px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);color:rgba(255,255,255,0.75);font-size:12px;font-weight:500;cursor:pointer;transition:all .13s}
.save-folder-btn:hover{background:rgba(91,138,245,0.18);border-color:rgba(91,138,245,0.35);color:#fff}
.save-folder-btn.active{background:rgba(91,138,245,0.22);border-color:rgba(91,138,245,0.5);color:var(--accent)}
.save-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:10px 13px;color:#fff;font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
.save-input:focus{border-color:rgba(91,138,245,0.55)}
.save-modal-ft{padding:12px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.2)}
.save-action{padding:8px 18px;border-radius:9px;border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.save-action.cancel{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.1)}
.save-action.cancel:hover{background:rgba(255,255,255,0.12);color:#fff}
.save-action.confirm{background:var(--accent);color:#fff}
.save-action.confirm:hover{background:#7aadff}

.vol-popup{position:fixed;bottom:82px;z-index:850;background:rgba(10,12,22,0.98);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.13);border-radius:14px;padding:14px 16px;box-shadow:0 14px 44px rgba(0,0,0,0.55);opacity:0;transform:translateY(8px)scale(0.95);transition:opacity .18s ease,transform .2s cubic-bezier(.2,1.2,.3,1);pointer-events:none;display:flex;flex-direction:column;gap:8px;min-width:190px}
.vol-popup.show{opacity:1;transform:translateY(0)scale(1);pointer-events:auto}
.vol-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.08em}
.vol-row{display:flex;align-items:center;gap:10px}
.range-wrap{flex:1;position:relative;height:18px;display:flex;align-items:center}
input[type=range].hb-range{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);outline:none;cursor:pointer;position:relative}
input[type=range].hb-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);cursor:pointer}
input[type=range].hb-range::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:none;cursor:pointer}
.vol-val{font-size:12px;font-weight:700;color:rgba(255,255,255,0.65);min-width:30px;text-align:right}

.lock-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.93);backdrop-filter:blur(32px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;transition:opacity .4s ease}
.lock-time{font-size:82px;font-weight:100;font-family:var(--mono);letter-spacing:-2px}
.lock-date{font-size:18px;color:rgba(255,255,255,0.55)}
.lock-hint{font-size:13px;color:rgba(255,255,255,0.3);margin-top:10px;animation:lp 2.5s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:.3}50%{opacity:.7}}

.exp-wrap{display:flex;height:100%}
.exp-sidebar{width:170px;flex-shrink:0;background:rgba(0,0,0,0.22);border-right:1px solid rgba(255,255,255,0.07);padding:10px 7px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.exp-nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.6);transition:all .13s;font-weight:500}
.exp-nav:hover{background:rgba(255,255,255,0.07);color:#fff}
.exp-nav.active{background:rgba(91,138,245,0.18);color:var(--accent)}
.exp-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.exp-toolbar{height:38px;flex-shrink:0;display:flex;align-items:center;gap:5px;padding:0 10px;border-bottom:1px solid rgba(255,255,255,0.07)}
.exp-tbtn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8);font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .13s}
.exp-tbtn:hover{background:rgba(255,255,255,0.14)}
.exp-tbtn:disabled{opacity:.3;cursor:not-allowed}
.exp-path{flex:1;display:flex;align-items:center;gap:3px;font-size:12px;overflow:hidden}
.exp-seg{color:rgba(255,255,255,0.6);cursor:pointer;white-space:nowrap;padding:2px 4px;border-radius:5px;transition:color .1s}
.exp-seg:hover{color:var(--accent);background:rgba(91,138,245,0.1)}
.exp-sep2{color:rgba(255,255,255,0.25)}
.exp-files{flex:1;padding:12px;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;overflow-y:auto}
.exp-item{width:86px;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 5px 8px;border-radius:10px;cursor:pointer;text-align:center;border:1px solid transparent;transition:all .13s}
.exp-item:hover{background:rgba(255,255,255,0.08)}
.exp-item.sel{background:rgba(91,138,245,0.18);border-color:rgba(91,138,245,0.42)}
.exp-item .ei-img{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.exp-item .ei-img svg,.exp-item .ei-img img{width:40px;height:40px;border-radius:4px}
.exp-item-name{font-size:11.5px;color:rgba(255,255,255,0.82);word-break:break-word;line-height:1.3}
.exp-empty{width:100%;text-align:center;padding:50px 20px;opacity:.4;font-size:14px;line-height:2}
.exp-statusbar{height:26px;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 12px;font-size:11px;color:rgba(255,255,255,0.35)}

.ed-wrap{display:flex;flex-direction:column;height:100%}
.ed-toolbar{height:36px;flex-shrink:0;display:flex;align-items:center;gap:6px;padding:0 10px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.18)}
.ed-btn{padding:4px 11px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .13s;font-weight:500}
.ed-btn:hover{background:rgba(255,255,255,0.13);color:#fff}
.ed-fname{font-size:12px;color:rgba(255,255,255,0.45);margin:0 2px;white-space:nowrap;overflow:hidden;max-width:180px;text-overflow:ellipsis}
.ed-status{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.3);white-space:nowrap}
textarea.ed-ta{flex:1;background:transparent;border:none;outline:none;resize:none;color:rgba(255,255,255,0.88);font-size:14px;font-family:var(--mono);padding:16px;line-height:1.75;caret-color:var(--accent);tab-size:2}
textarea.ed-ta::selection{background:rgba(91,138,245,0.35)}

.term-wrap{display:flex;flex-direction:column;height:100%;background:rgba(4,6,12,0.9);padding:14px;font-family:var(--mono)}
.term-out{flex:1;overflow-y:auto;font-size:13px;line-height:1.65;margin-bottom:8px}
.term-line{word-break:break-all}
.term-line.err{color:#ff8080}.term-line.info{color:rgba(255,255,255,0.4)}
.term-line.ok{color:#78e0a0}.term-line.acc{color:#a0c8ff;font-weight:700}
.term-row{display:flex;align-items:center;gap:7px}
.term-prompt{color:#5b8af5;font-size:13px;white-space:nowrap;flex-shrink:0}
.term-in{flex:1;background:none;border:none;outline:none;color:#a8ff78;font-size:13px;font-family:var(--mono);caret-color:#a8ff78}

.calc-wrap{display:flex;flex-direction:column;height:100%;padding:14px;gap:10px}
.calc-disp{background:rgba(0,0,0,0.38);border-radius:12px;padding:10px 14px;border:1px solid rgba(255,255,255,0.07);text-align:right}
.calc-expr{font-size:12px;color:rgba(255,255,255,0.38);font-family:var(--mono);min-height:18px}
.calc-val{font-size:38px;font-weight:300;color:#fff;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1}
.c-btn{border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.09);color:rgba(255,255,255,0.88);font-size:18px;font-family:var(--font);cursor:pointer;transition:all .12s;font-weight:500;display:flex;align-items:center;justify-content:center}
.c-btn:hover{background:rgba(255,255,255,0.14)}.c-btn:active{transform:scale(.91)}
.c-btn.op{background:rgba(91,138,245,0.15);color:#8ab4ff;border-color:rgba(91,138,245,0.2)}
.c-btn.op:hover{background:rgba(91,138,245,0.26)}
.c-btn.eq{background:var(--accent);color:#fff;border-color:transparent}
.c-btn.eq:hover{background:#7aadff}
.c-btn.cl{background:rgba(255,90,90,0.13);color:#ff9090;border-color:rgba(255,90,90,0.2)}
.c-btn.cl:hover{background:rgba(255,90,90,0.24)}
.c-btn.s2{grid-column:span 2}

.clock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:20px}
.clock-dig{font-size:46px;font-weight:200;font-family:var(--mono);letter-spacing:.06em}
.clock-date-str{font-size:14px;color:var(--text-dim);font-weight:500}

.imgv-wrap{width:100%;height:100%;display:flex;flex-direction:column;background:rgba(0,0,0,0.55)}
.imgv-toolbar{height:36px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:0 12px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.07)}
.imgv-btn{width:28px;height:28px;border-radius:7px;border:none;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .13s}
.imgv-btn:hover{background:rgba(255,255,255,0.14)}
.imgv-name{font-size:12px;color:rgba(255,255,255,0.5);margin-left:4px}
.imgv-zoom{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.35);font-family:var(--mono)}
.imgv-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:grab}
.imgv-stage:active{cursor:grabbing}
.imgv-stage img{max-width:100%;max-height:100%;border-radius:4px;box-shadow:0 12px 40px rgba(0,0,0,0.6);transform-origin:center;user-select:none;pointer-events:none}
.imgv-err{text-align:center;opacity:.4;font-size:14px;line-height:2.2}

.vid-wrap{width:100%;height:100%;display:flex;flex-direction:column;background:#000}
.vid-stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.vid-stage video{max-width:100%;max-height:100%}
.vid-err{padding:40px;text-align:center;opacity:.4;font-size:14px;line-height:2.2}
.vid-controls{flex-shrink:0;padding:10px 14px;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;gap:8px}
.vid-progress{width:100%;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;cursor:pointer;position:relative}
.vid-progress-fill{height:100%;background:var(--accent);border-radius:3px;pointer-events:none}
.vid-btns{display:flex;align-items:center;gap:8px}
.vid-btn{background:none;border:none;color:rgba(255,255,255,0.8);font-size:17px;cursor:pointer;padding:3px 6px;border-radius:6px;transition:all .13s}
.vid-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.vid-time{font-size:12px;color:rgba(255,255,255,0.5);font-family:var(--mono);margin-left:auto}

.aud-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;background:radial-gradient(ellipse at 50% 0%,rgba(91,138,245,0.12),transparent 70%)}
.aud-art{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,rgba(91,138,245,0.3),rgba(155,89,245,0.3));border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.aud-art.playing{animation:audSpin 8s linear infinite}
@keyframes audSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.aud-title{font-size:16px;font-weight:700;color:#fff;text-align:center;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aud-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:-14px}
.aud-prog-wrap{width:100%;display:flex;flex-direction:column;gap:5px}
.aud-prog{width:100%;height:5px;background:rgba(255,255,255,0.12);border-radius:3px;cursor:pointer}
.aud-prog-fill{height:100%;background:linear-gradient(to right,var(--accent),var(--accent2));border-radius:3px;pointer-events:none}
.aud-times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);font-family:var(--mono)}
.aud-btns{display:flex;align-items:center;gap:14px}
.aud-btn{background:none;border:none;color:rgba(255,255,255,0.7);font-size:20px;cursor:pointer;padding:6px;border-radius:50%;transition:all .15s}
.aud-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.aud-btn.main{width:50px;height:50px;background:var(--accent);color:#fff;font-size:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(91,138,245,0.4)}
.aud-btn.main:hover{background:#7aadff;transform:scale(1.07)}
.aud-vol-row{display:flex;align-items:center;gap:10px;width:100%}
.aud-vol-ico{font-size:14px;opacity:.5}

.sett-wrap{display:flex;height:100%}
.sett-side{width:160px;flex-shrink:0;background:rgba(0,0,0,0.2);border-right:1px solid rgba(255,255,255,0.07);padding:10px 7px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sett-nav{padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);transition:all .13s}
.sett-nav:hover{background:rgba(255,255,255,0.07);color:#fff}
.sett-nav.active{background:rgba(91,138,245,0.2);color:var(--accent)}
.sett-body{flex:1;padding:18px;overflow-y:auto}
.sett-sec{margin-bottom:22px}
.sett-sec h3{font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.sett-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06);margin-bottom:5px;gap:10px}
.sett-row.col{flex-direction:column;align-items:flex-start}
.sett-row label{font-size:13.5px;color:rgba(255,255,255,0.8);flex-shrink:0}
.sett-row .val{font-size:13px;color:rgba(255,255,255,0.4);text-align:right}
.sett-row .val.on{color:#78e0a0}
.sett-toggle{position:relative;width:42px;height:24px;flex-shrink:0;cursor:pointer}
.sett-toggle input{opacity:0;width:0;height:0;position:absolute}
.sett-toggle-track{position:absolute;inset:0;background:rgba(255,255,255,0.15);border-radius:12px;transition:background .2s}
.sett-toggle input:checked+.sett-toggle-track{background:var(--accent)}
.sett-toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,0.4)}
.sett-toggle input:checked~.sett-toggle-thumb{transform:translateX(18px)}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.3)}
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.wp-opt{height:58px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;overflow:hidden}
.wp-opt:hover{transform:scale(1.05)}
.wp-opt.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,0.28)}
.wp-opt span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,0.8);text-shadow:0 1px 4px rgba(0,0,0,0.9)}
.sett-range-wrap{width:100%;display:flex;align-items:center;gap:10px;margin-top:4px}
.sett-range-wrap input[type=range]{flex:1}
.sett-range-val{font-size:12px;color:rgba(255,255,255,0.5);min-width:36px;text-align:right;font-family:var(--mono)}
</style>
</head>
<body>

<div id="desktop">
  <div id="wallpaper"><div id="wallpaper-overlay"></div><div id="aurora"></div></div>
  <canvas id="stars-canvas"></canvas>
  <div id="icon-area"></div>
</div>

<div id="drop-zone">
  <div class="dz-box">
    <div class="dz-ico">📥</div>
    <div class="dz-title">Drop files to import</div>
    <div class="dz-sub">Images, videos, audio, text — any file works</div>
  </div>
</div>

<div id="tb-wrap">
  <div id="taskbar">
    <div id="start-btn" title="Start Menu">
      <img id="sb-img" src="./public/winlogo.png" alt="Start">
      <span class="sb-fb">⊞</span>
    </div>
    <div class="tb-div"></div>
    <div id="tb-apps"></div>
    <div class="tb-div"></div>
    <div id="sys-tray">
      <div class="tray-ico" id="tray-vol" title="Volume">🔊</div>
      <div id="clock-tray"></div>
    </div>
  </div>
</div>

<div class="vol-popup" id="vol-popup">
  <div class="vol-title">Volume</div>
  <div class="vol-row">
    <span style="font-size:15px">🔈</span>
    <input type="range" class="hb-range" id="vol-range" min="0" max="100" value="80" style="flex:1">
    <span class="vol-val" id="vol-val">80%</span>
  </div>
</div>

<div id="start-menu">
  <div class="sm-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search apps…" id="sm-input" autocomplete="off">
  </div>
  <div class="sm-label">Apps</div>
  <div class="sm-grid" id="sm-grid"></div>
  <div class="sm-footer">
    <div class="sm-user"><div class="sm-avatar">👤</div><span>User</span></div>
    <div class="sm-btns">
      <div class="sm-btn" id="sm-lock" title="Lock">🔒</div>
      <div class="sm-btn" id="sm-restart" title="Restart">🔄</div>
      <div class="sm-btn" id="sm-power" title="Power">⏻</div>
    </div>
  </div>
</div>

<div id="ctx"></div>
<div id="toasts"></div>

// Try loading an app image from `path`; if it doesn't exist or fails, replace with generated SVG icon
function ensureAppImage(imgEl, path, icoKey){
  if(!path) { imgEl.onerror?.(); return; }
  fetch(path, {method:'GET'}).then(r=>{
    if(r.ok){ imgEl.src = path; }
    else throw new Error('not ok');
  }).catch(()=>{
    const d=document.createElement('div');
    d.style.cssText = `width:${imgEl.width}px;height:${imgEl.height}px;display:flex;align-items:center;justify-content:center`;
    d.innerHTML = ICO[icoKey]?ICO[icoKey]():'';
    imgEl.replaceWith(d);
  });
}

function fsGet(path){
  if(!path||path==='/')return FS['/'];
  const parts=path.replace(/^\/+/,'').split('/').filter(Boolean);
  let n=FS['/'];
  for(const p of parts){if(!n?.children?.[p])return null;n=n.children[p];}
  return n;
}

// ── FILE TYPE HELPERS ─────────────────────────────────────────
const IMG_EXT=['jpg','jpeg','png','gif','webp','bmp','svg'];
const VID_EXT=['mp4','webm','ogv','mov'];
const AUD_EXT=['mp3','wav','ogg','flac','aac','m4a'];
const TXT_EXT=['txt','md','csv','json','js','css','html','py','sh','xml','log'];

function extIcon(ext){
  if(IMG_EXT.includes(ext))return 'file_img';
  if(VID_EXT.includes(ext))return 'file_video';
  if(AUD_EXT.includes(ext))return 'file_music';
  if(TXT_EXT.includes(ext))return 'file_txt';
  return 'file_bin';
}

// ── MANIFEST LOADER ───────────────────────────────────────────
// Reads ./public/manifest.json and populates the FS.
// Format: { "Desktop": ["file.txt", "photo.jpg"], "Music": ["song.mp3"], ... }
// Files go in ./public/FolderName/filename on disk.
// Purely static — works on GitHub Pages with no backend.
async function loadManifest(){
  try{
    const res=await fetch('./public/manifest.json');
    if(!res.ok)return;
    const manifest=await res.json();
    const folders=Object.keys(manifest).filter(k=>k!=='_readme');
    let loaded=0;
    for(const folder of folders){
      const files=manifest[folder];
      if(!Array.isArray(files)||!files.length)continue;
      const folderNode=fsGet('/'+folder);
      if(!folderNode?.children)continue;
      for(const filename of files){
        // Don't overwrite hardcoded FS entries
        if(folderNode.children[filename])continue;
        const ext=filename.split('.').pop().toLowerCase();
        const url=`./public/${folder}/${filename}`;
        if(TXT_EXT.includes(ext)){
          // Fetch text content
          try{
            const r=await fetch(url);
            if(r.ok){
              const content=await r.text();
              folderNode.children[filename]={type:'file',icon:'file_txt',content};
              loaded++;
            }
          }catch(e){}
        }else{
          // Media/binary: store URL directly (works as src for img/video/audio)
          folderNode.children[filename]={type:'file',icon:extIcon(ext),blobUrl:url,content:null};
          // if the file is audio and placed on the desktop manifest, mirror it in Music so player can find it easily
          if(folder==='Desktop' && AUD_EXT.includes(ext)){
            const mNode=fsGet('/Music');
            if(mNode?.children && !mNode.children[filename]){
              mNode.children[filename]={type:'file',icon:'file_music',blobUrl:url,content:null};
            }
          }
          loaded++;
        }
      }
    }
    if(loaded>0){
      renderDesktopFsIcons();
    }
  }catch(e){
    // manifest.json missing or invalid — silent fail, OS boots normally
  }
}

const WM=(()=>{
  const wins=new Map();let z=200,active=null;
  const el=id=>document.getElementById('win_'+id);

  function focus(id){
    if(active===id)return;
    if(active){el(active)?.classList.remove('focused');document.querySelector(`.tb-app[data-wid="${active}"]`)?.classList.remove('active');}
    active=id;
    const e=el(id);if(!e)return;
    e.style.zIndex=++z;e.classList.add('focused');
    document.querySelector(`.tb-app[data-wid="${id}"]`)?.classList.add('active');
  }

  function create({id,title,width,height,content,onMount,imgSrc,iconKey}){
    if(wins.has(id)){const s=wins.get(id);s.minimized?restore(id):focus(id);return;}
    const off=(wins.size%8)*28;
    const L=Math.max(20,(window.innerWidth-width)/2+off);
    const T=Math.max(10,(window.innerHeight-height)/2+off);
    const e=document.createElement('div');e.className='window';e.id='win_'+id;
    e.style.cssText=`left:${L}px;top:${T}px;width:${width}px;height:${height}px;z-index:${++z}`;
    const iH=imgSrc
      ?`<div class="win-icon-sm"><img src="${imgSrc}" onerror="this.style.display='none'" alt=""></div>`
      :(ICO[iconKey]?`<div class="win-icon-sm" style="width:17px;height:17px">${ICO[iconKey]()}</div>`:'');
    e.innerHTML=`
      <div class="win-titlebar"><div class="traffic"><button class="tb cl"></button><button class="tb mn"></button><button class="tb mx"></button></div>${iH}<div class="win-title">${title}</div></div>
      <div class="win-body">${content}</div>
      <div class="rh n"></div><div class="rh s"></div><div class="rh e"></div><div class="rh w"></div>
      <div class="rh se"></div><div class="rh sw"></div><div class="rh ne"></div><div class="rh nw"></div>`;
    e.style.opacity='0';e.style.transform='scale(0.9)translateY(18px)';
    document.body.appendChild(e);
    wins.set(id,{minimized:false,maximized:false,saved:null});
    requestAnimationFrame(()=>{
      e.style.transition='opacity .25s ease,transform .32s cubic-bezier(.2,1.2,.3,1)';
      e.style.opacity='1';e.style.transform='scale(1)translateY(0)';
      setTimeout(()=>e.style.transition='',380);
    });
    const[cl,mn,mx]=e.querySelectorAll('.tb');
    cl.onclick=ev=>{ev.stopPropagation();close(id);};
    mn.onclick=ev=>{ev.stopPropagation();minimize(id);};
    mx.onclick=ev=>{ev.stopPropagation();toggleMax(id);};
    e.querySelector('.win-titlebar').addEventListener('dblclick',ev=>{if(!ev.target.classList.contains('tb'))toggleMax(id);});
    e.addEventListener('mousedown',ev=>{if(!ev.target.classList.contains('tb'))focus(id);});
    _drag(e,e.querySelector('.win-titlebar'),id);
    e.querySelectorAll('.rh').forEach(h=>_resize(e,h,id));
    _addTb(id,title,imgSrc,iconKey);
    focus(id);
    if(onMount)setTimeout(()=>onMount(e),14);
  }

  function close(id){
    const e=el(id);if(!e)return;
    e.style.transition='opacity .2s ease,transform .22s ease';
    e.style.opacity='0';e.style.transform='scale(0.88)translateY(18px)';
    setTimeout(()=>{e.remove();wins.delete(id);_removeTb(id);if(active===id)active=null;},220);
  }
  function minimize(id){
    const e=el(id),s=wins.get(id);if(!e||!s)return;
    s.minimized=true;
    e.style.transition='opacity .22s ease,transform .25s cubic-bezier(.4,0,.6,1)';
    e.style.opacity='0';e.style.transform='scale(0.5)translateY(220px)';
    setTimeout(()=>e.style.visibility='hidden',260);
    document.querySelector(`.tb-app[data-wid="${id}"]`)?.classList.remove('active');
    if(active===id)active=null;
  }
  function restore(id){
    const e=el(id),s=wins.get(id);if(!e||!s)return;
    s.minimized=false;e.style.visibility='visible';
    e.style.opacity='0';e.style.transform='scale(0.82)translateY(40px)';
    requestAnimationFrame(()=>{
      e.style.transition='opacity .25s ease,transform .32s cubic-bezier(.2,1.2,.3,1)';
      e.style.opacity='1';e.style.transform='scale(1)translateY(0)';
      setTimeout(()=>e.style.transition='',360);
    });
    focus(id);
  }
  function toggleMax(id){
    const e=el(id),s=wins.get(id);if(!e||!s)return;
    e.style.transition='all .3s cubic-bezier(.2,1,.3,1)';
    if(!s.maximized){
      s.saved={l:e.style.left,t:e.style.top,w:e.style.width,h:e.style.height};
      e.style.left='0';e.style.top='0';e.style.width='100vw';e.style.height='100vh';
      e.classList.add('maximized');s.maximized=true;
    }else{
      const r=s.saved;e.style.left=r.l;e.style.top=r.t;e.style.width=r.w;e.style.height=r.h;
      e.classList.remove('maximized');s.maximized=false;
    }
    setTimeout(()=>e.style.transition='',320);
  }

  function _drag(win,bar,id){
    let sx,sy,sl,st,on=false;
    bar.addEventListener('mousedown',e=>{if(e.target.classList.contains('tb'))return;if(wins.get(id)?.maximized)return;on=true;sx=e.clientX;sy=e.clientY;sl=win.offsetLeft;st=win.offsetTop;e.preventDefault();focus(id);});
    document.addEventListener('mousemove',e=>{if(!on)return;win.style.left=(sl+e.clientX-sx)+'px';win.style.top=Math.max(0,st+e.clientY-sy)+'px';});
    document.addEventListener('mouseup',()=>on=false);
  }
  function _resize(win,handle,id){
    const dir=[...handle.classList].find(c=>/^(n|s|e|w|se|sw|ne|nw)$/.test(c));if(!dir)return;
    let sx,sy,sw,sh,sl,st,on=false;
    handle.addEventListener('mousedown',e=>{if(wins.get(id)?.maximized)return;on=true;sx=e.clientX;sy=e.clientY;sw=win.offsetWidth;sh=win.offsetHeight;sl=win.offsetLeft;st=win.offsetTop;e.preventDefault();e.stopPropagation();});
    document.addEventListener('mousemove',e=>{if(!on)return;const dx=e.clientX-sx,dy=e.clientY-sy,mW=300,mH=180;
      if(dir.includes('e'))win.style.width=Math.max(mW,sw+dx)+'px';
      if(dir.includes('s'))win.style.height=Math.max(mH,sh+dy)+'px';
      if(dir.includes('n')){const nH=Math.max(mH,sh-dy);win.style.height=nH+'px';win.style.top=(st+sh-nH)+'px';}
      if(dir.includes('w')){const nW=Math.max(mW,sw-dx);win.style.width=nW+'px';win.style.left=(sl+sw-nW)+'px';}
    });
    document.addEventListener('mouseup',()=>on=false);
  }

  function _addTb(id,title,imgSrc,iconKey){
    const e=document.createElement('div');e.className='tb-app open';e.dataset.wid=id;
    const iH=imgSrc
      ?`<img src="${imgSrc}" width="28" height="28" onerror="this.style.display='none'" alt="">`
      :`<div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center">${ICO[iconKey]?ICO[iconKey]():''}</div>`;
    e.innerHTML=`${iH}<div class="tb-tip">${title}</div><div class="tb-dot"></div>`;
    e.addEventListener('click',()=>{const s=wins.get(id);if(!s)return;s.minimized?restore(id):(active===id?minimize(id):focus(id));});
    e.addEventListener('contextmenu',ev=>{ev.preventDefault();ctxMenu(ev.clientX,ev.clientY,[{label:'↩ Restore',fn:()=>restore(id)},{label:'⊡ Maximize',fn:()=>toggleMax(id)},{sep:true},{label:'✕ Close',fn:()=>close(id),danger:true}]);});
    document.getElementById('tb-apps').appendChild(e);
  }
  function _removeTb(id){
    const e=document.querySelector(`.tb-app[data-wid="${id}"]`);if(!e)return;
    e.style.transition='all .18s ease';e.style.opacity='0';e.style.transform='scale(0.5)';
    setTimeout(()=>e.remove(),180);
  }
  return {create,close,minimize,restore,toggleMax,focus};
})();
