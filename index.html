<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HueBit OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#5b8af5;--accent2:#9b59f5;
  --text:#eaf0ff;--text-dim:rgba(255,255,255,0.45);
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Cascadia Code','Consolas','Courier New',monospace;
  --radius:14px;--taskbar-h:60px;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);color:var(--text);background:#040608;user-select:none}
#vsc-termout,.term-out{user-select:text;cursor:text}
::selection{background:rgba(91,138,245,0.4)}
*::-webkit-scrollbar{width:5px;height:5px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.3)}


#desktop{position:fixed;inset:0;overflow:hidden}
#wallpaper{position:absolute;inset:0;background-image:url('./public/wallpaper.png');background-size:cover;background-position:center;transition:all 0.8s ease}
#wallpaper-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.15);pointer-events:none}
#aurora{position:absolute;inset:0;pointer-events:none}
#aurora::before,#aurora::after{content:'';position:absolute;border-radius:50%;filter:blur(100px);mix-blend-mode:screen}
#aurora::before{width:60vw;height:50vh;background:radial-gradient(circle,rgba(91,138,245,0.14) 0%,transparent 70%);top:-10%;left:-5%;animation:aA 14s ease-in-out infinite alternate}
#aurora::after{width:50vw;height:60vh;background:radial-gradient(circle,rgba(155,89,245,0.11) 0%,transparent 70%);bottom:8%;right:-5%;animation:aB 16s ease-in-out infinite alternate}
@keyframes aA{0%{transform:translate(0,0)scale(1)}100%{transform:translate(4%,7%)scale(1.06)}}
@keyframes aB{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-3%,4%)scale(0.96)}}
#stars-canvas{position:absolute;inset:0;pointer-events:none;opacity:0.6}

.desk-icon{position:absolute;width:80px;text-align:center;cursor:pointer;padding:6px 4px 8px;border-radius:12px;border:1px solid transparent;transition:background .15s,border-color .15s,transform .2s cubic-bezier(.2,1.2,.3,1);box-sizing:border-box}
.desk-icon:hover{background:rgba(255,255,255,0.09);transform:translateY(-3px)scale(1.05)}
.desk-icon.selected{background:rgba(91,138,245,0.2);border-color:rgba(91,138,245,0.5)}
.desk-icon .di-img{width:52px;height:52px;display:block;margin:0 auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.55));transition:filter .2s,width .2s,height .2s}
.desk-icon:hover .di-img{filter:drop-shadow(0 6px 18px rgba(0,0,0,0.7))}
.desk-icon .di-img svg,.desk-icon .di-img img{width:100%;height:100%}
.desk-icon span{display:block;margin-top:5px;font-size:12px;font-weight:500;color:#fff;text-shadow:0 1px 7px rgba(0,0,0,0.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#drop-zone{position:fixed;inset:0;z-index:7000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s ease}
#drop-zone.show{opacity:1;pointer-events:auto}
.dz-box{border:2px dashed rgba(91,138,245,0.7);border-radius:22px;padding:50px 70px;text-align:center;background:rgba(91,138,245,0.08);animation:dzPulse 2s ease-in-out infinite}
@keyframes dzPulse{0%,100%{border-color:rgba(91,138,245,0.5)}50%{border-color:rgba(91,138,245,0.9)}}
.dz-ico{font-size:52px;margin-bottom:14px}
.dz-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.dz-sub{font-size:13px;color:rgba(255,255,255,0.5)}

.window{position:fixed;display:flex;flex-direction:column;background:rgba(12,14,24,0.9);backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.1);box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.04) inset;overflow:hidden;will-change:transform;min-width:300px;min-height:200px}
.window.focused{border-color:rgba(91,138,245,0.3);box-shadow:0 36px 90px rgba(0,0,0,0.7),0 0 0 1px rgba(91,138,245,0.2),0 0 0 0.5px rgba(255,255,255,0.06) inset}
.window.maximized{border-radius:0!important;border:none!important}
.win-titlebar{height:42px;min-height:42px;display:flex;align-items:center;gap:8px;padding:0 10px 0 12px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07);cursor:grab;flex-shrink:0}
.win-titlebar:active{cursor:grabbing}
.window:not(.focused) .win-titlebar{opacity:0.75}
.traffic{display:flex;gap:7px;flex-shrink:0}
.tb{width:13px;height:13px;border-radius:50%;cursor:pointer;border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0;transition:all .15s;outline:none}
.tb:hover{filter:brightness(1.15);font-size:7px;color:rgba(0,0,0,0.55)}
.tb.cl{background:#ff5f57}.tb.cl::after{content:'\00D7'}
.tb.mn{background:#ffbd2e}.tb.mn::after{content:'–'}
.tb.mx{background:#28c840}.tb.mx::after{content:'⤢'}
.win-title{flex:1;text-align:center;font-size:13px;font-weight:600;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.win-icon-sm{width:17px;height:17px;flex-shrink:0;opacity:0.8;pointer-events:none;display:flex;align-items:center}
.win-icon-sm img,.win-icon-sm svg{width:17px;height:17px}
.win-body{flex:1;overflow:hidden;position:relative;min-height:0}
.rh{position:absolute;z-index:10}
.rh.n{top:0;left:8px;right:8px;height:5px;cursor:n-resize}
.rh.s{bottom:0;left:8px;right:8px;height:5px;cursor:s-resize}
.rh.e{right:0;top:8px;bottom:8px;width:5px;cursor:e-resize}
.rh.w{left:0;top:8px;bottom:8px;width:5px;cursor:w-resize}
.rh.se{bottom:0;right:0;width:15px;height:15px;cursor:se-resize}
.rh.sw{bottom:0;left:0;width:15px;height:15px;cursor:sw-resize}
.rh.ne{top:0;right:0;width:15px;height:15px;cursor:ne-resize}
.rh.nw{top:0;left:0;width:15px;height:15px;cursor:nw-resize}

#tb-wrap{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:800}
#taskbar{height:var(--taskbar-h);display:flex;align-items:center;gap:4px;padding:0 14px;background:rgba(10,12,22,0.9);backdrop-filter:blur(30px) saturate(2);-webkit-backdrop-filter:blur(30px) saturate(2);border-radius:22px;border:1px solid rgba(255,255,255,0.14);box-shadow:0 14px 44px rgba(0,0,0,0.55),0 1px 0 rgba(255,255,255,0.07) inset}
.tb-div{width:1px;height:28px;background:rgba(255,255,255,0.1);margin:0 4px;flex-shrink:0}
#start-btn{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);transition:all .22s cubic-bezier(.2,1.2,.3,1);overflow:hidden}
#start-btn:hover{background:rgba(91,138,245,0.22);transform:translateY(-4px)scale(1.08);border-color:rgba(91,138,245,0.4)}
#start-btn img{width:28px;height:28px}
#start-btn .sb-fb{font-size:22px;display:none}
#tb-apps{display:flex;gap:4px;align-items:center}
.tb-app{width:44px;height:44px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s cubic-bezier(.2,1.4,.3,1);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)}
.tb-app:hover{transform:translateY(-5px)scale(1.11);background:rgba(255,255,255,0.11)}
.tb-app:active{transform:translateY(-2px)scale(0.97)}
.tb-app img,.tb-app svg{width:28px;height:28px}
.tb-dot{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent);display:none}
.tb-app.open .tb-dot{display:block}
.tb-app.active .tb-dot{background:#fff;width:6px;height:6px}
.tb-tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:rgba(12,15,28,0.98);border:1px solid rgba(255,255,255,0.1);padding:5px 10px;border-radius:8px;font-size:12px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 5px 15px rgba(0,0,0,0.45)}
.tb-app:hover .tb-tip{opacity:1}
#sys-tray{display:flex;align-items:center;gap:6px;padding:0 2px}
#clock-tray{font-size:12px;font-weight:600;color:rgba(255,255,255,0.88);cursor:default;text-align:center;line-height:1.45}
.tray-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;opacity:0.65;font-size:14px;cursor:pointer;transition:opacity .15s;border-radius:7px}
.tray-ico:hover{opacity:1;background:rgba(255,255,255,0.1)}

#start-menu{position:fixed;bottom:82px;left:50%;transform:translateX(-50%)scale(0.93)translateY(18px);width:520px;background:rgba(9,11,22,0.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:20px;border:1px solid rgba(255,255,255,0.12);box-shadow:0 40px 100px rgba(0,0,0,0.8);z-index:750;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.2,1.2,.3,1);overflow:hidden}
#start-menu.open{opacity:1;pointer-events:auto;transform:translateX(-50%)scale(1)translateY(0)}
.sm-search{margin:16px 16px 12px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:10px 14px}
.sm-search input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;font-family:var(--font)}
.sm-search input::placeholder{color:rgba(255,255,255,0.35)}
.sm-label{padding:0 16px 8px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em}
.sm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:0 10px 10px}
.sm-item{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 6px;border-radius:12px;cursor:pointer;transition:background .13s;text-align:center}
.sm-item:hover{background:rgba(255,255,255,0.08)}
.sm-item:active{transform:scale(0.96)}
.sm-item .si-img{width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.sm-item .si-img img,.sm-item .si-img svg{width:36px;height:36px}
.sm-item span{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8)}
.sm-footer{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.07)}
.sm-user{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.sm-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px}
.sm-btns{display:flex;gap:6px}
.sm-btn{width:30px;height:30px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;color:rgba(255,255,255,0.65)}
.sm-btn:hover{background:rgba(255,90,90,0.22);color:#ff9090;border-color:rgba(255,90,90,0.3)}

#ctx{position:fixed;z-index:9999;background:rgba(10,12,24,0.99);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.13);border-radius:12px;padding:6px;min-width:190px;box-shadow:0 22px 65px rgba(0,0,0,0.7);opacity:0;transform:scale(0.9)translateY(-8px);transition:opacity .15s ease,transform .17s cubic-bezier(.2,1.2,.3,1);display:none}
#ctx.show{opacity:1;transform:scale(1)translateY(0)}
.ctx-item{padding:9px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.82);transition:all .1s}
.ctx-item:hover{background:rgba(91,138,245,0.18);color:#fff;padding-left:16px}
.ctx-item.danger:hover{background:rgba(255,80,80,0.18);color:#ff9090}
.ctx-sep{height:1px;background:rgba(255,255,255,0.08);margin:4px 0}

#toasts{position:fixed;top:14px;right:14px;z-index:9990;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(10,12,22,0.97);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-left:3px solid var(--accent);border-radius:12px;padding:11px 14px;min-width:250px;max-width:310px;box-shadow:0 10px 32px rgba(0,0,0,0.45);display:flex;gap:11px;align-items:flex-start;pointer-events:auto;animation:toastIn .38s cubic-bezier(.2,1.2,.3,1) forwards;cursor:pointer}
.toast.out{animation:toastOut .22s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)scale(0.94)}to{opacity:1;transform:translateX(0)scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)scale(1)}to{opacity:0;transform:translateX(40px)scale(0.95)}}
.toast-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.toast-title{font-size:13px;font-weight:700;margin-bottom:2px}
.toast-msg{font-size:12px;color:rgba(255,255,255,0.5)}

.save-overlay{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.save-modal{width:440px;background:rgba(12,14,24,0.98);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.13);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,0.7);overflow:hidden;animation:saveIn .28s cubic-bezier(.2,1.2,.3,1)}
@keyframes saveIn{from{opacity:0;transform:scale(0.92)translateY(14px)}to{opacity:1;transform:scale(1)translateY(0)}}
.save-modal-hd{padding:16px 18px 12px;font-size:14px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.07)}
.save-modal-body{padding:14px 18px}
.save-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.save-folders{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.save-folder-btn{padding:6px 13px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);color:rgba(255,255,255,0.75);font-size:12px;font-weight:500;cursor:pointer;transition:all .13s}
.save-folder-btn:hover{background:rgba(91,138,245,0.18);border-color:rgba(91,138,245,0.35);color:#fff}
.save-folder-btn.active{background:rgba(91,138,245,0.22);border-color:rgba(91,138,245,0.5);color:var(--accent)}
.save-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:10px 13px;color:#fff;font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
.save-input:focus{border-color:rgba(91,138,245,0.55)}
.save-modal-ft{padding:12px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.2)}
.save-action{padding:8px 18px;border-radius:9px;border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.save-action.cancel{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.1)}
.save-action.cancel:hover{background:rgba(255,255,255,0.12);color:#fff}
.save-action.confirm{background:var(--accent);color:#fff}
.save-action.confirm:hover{background:#7aadff}

.vol-popup{position:fixed;bottom:82px;z-index:850;background:rgba(10,12,22,0.98);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.13);border-radius:14px;padding:14px 16px;box-shadow:0 14px 44px rgba(0,0,0,0.55);opacity:0;transform:translateY(8px)scale(0.95);transition:opacity .18s ease,transform .2s cubic-bezier(.2,1.2,.3,1);pointer-events:none;display:flex;flex-direction:column;gap:8px;min-width:190px}
.vol-popup.show{opacity:1;transform:translateY(0)scale(1);pointer-events:auto}
.vol-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.08em}
.vol-row{display:flex;align-items:center;gap:10px}
.range-wrap{flex:1;position:relative;height:18px;display:flex;align-items:center}
input[type=range].hb-range{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);outline:none;cursor:pointer;position:relative}
input[type=range].hb-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);cursor:pointer}
input[type=range].hb-range::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:none;cursor:pointer}
.vol-val{font-size:12px;font-weight:700;color:rgba(255,255,255,0.65);min-width:30px;text-align:right}

/* ── LOCK SCREEN STYLES (START) ─────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@200;300&family=Outfit:wght@300;400;500&display=swap');

.lock-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #0b0e13;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .6s ease; overflow: hidden;
  cursor: default;
}

.lock-aurora {
  position: absolute; inset: -60%; width: 220%; height: 220%;
  background:
    radial-gradient(ellipse 52% 44% at 22% 30%, rgba(72,108,155,.20) 0%, transparent 55%),
    radial-gradient(ellipse 44% 56% at 80% 68%, rgba(155,108,80,.13) 0%, transparent 52%),
    radial-gradient(ellipse 36% 52% at 60% 15%, rgba(80,130,148,.11) 0%, transparent 48%),
    radial-gradient(ellipse 60% 35% at 50% 90%, rgba(50,70,100,.15) 0%, transparent 60%);
  animation: auroraShift 24s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes auroraShift {
  0%   { transform: translate(0,0)      rotate(0deg)   scale(1);     }
  25%  { transform: translate(-2%,3%)   rotate(.6deg)  scale(1.015); }
  50%  { transform: translate(3%,-2%)   rotate(-.4deg) scale(.99);   }
  75%  { transform: translate(-1.5%,1%) rotate(.5deg)  scale(1.01);  }
  100% { transform: translate(2%,-1.5%) rotate(-.3deg) scale(1.005); }
}

.lock-grain {
  position: absolute; inset: 0; opacity: .04; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 160px 160px;
}

/* ── CTA flotando sola, fuera del flujo del reloj ── */
.lock-cta {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  margin-top: 36px;         /* distancia fija bajo el reloj */
  white-space: nowrap;
  pointer-events: auto;
  opacity: 0;
  animation: lockCtaFade .9s ease .4s forwards;  /* solo opacity, sin transform */
  transition: opacity .25s ease;
}
.lock-cta.hidden {
  opacity: 0 !important;
  pointer-events: none;
}

@keyframes lockCtaFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.lock-cta-arrow {
  width: 28px; height: 28px;
  border: 1.5px solid rgba(255,255,255,.18); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  animation: ctaBounce 2.4s ease-in-out infinite;
}
.lock-cta-arrow svg { opacity: .45; }
@keyframes ctaBounce {
  0%,100% { transform: translateY(0);    opacity: .7; }
  50%      { transform: translateY(-6px); opacity: 1;  }
}
.lock-cta-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 300;
  color: rgba(255,255,255,.25);
  letter-spacing: .16em; text-transform: uppercase;
}

/* ── lock-content: solo reloj + card ── */
.lock-content {
  position: relative; z-index: 1;
  display: none; /* Hide standalone lock markup until overlay is active */
  flex-direction: column; align-items: center;
}

.lock-overlay .lock-content,
.vsc-tut-overlay .lock-content {
  display: flex;
}

.lock-clock-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 0;
  transition: margin-bottom .6s cubic-bezier(.16,1,.3,1);
}
.lock-clock-wrap.login-mode {
  margin-bottom: 28px;
}

.lock-big-time {

/* ── Card ── */
.lock-card {
  opacity: 0;
  transform: translateY(32px) scale(.97);
  pointer-events: none;
  transition:
    opacity   .52s cubic-bezier(.16,1,.3,1),
    transform .52s cubic-bezier(.16,1,.3,1);
  background: rgba(255,255,255,.042);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 22px;
  padding: 26px 28px 22px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  width: 292px;
  backdrop-filter: blur(32px) saturate(1.1);
  box-shadow:
    0 40px 80px rgba(0,0,0,.48),
    0 1px 0 rgba(255,255,255,.055) inset,
    0 -1px 0 rgba(0,0,0,.25) inset;
}
.lock-card.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

.lock-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(145deg, #8aa4c4, #6080a0);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.32), 0 0 0 1.5px rgba(255,255,255,.08);
  flex-shrink: 0; overflow: hidden;
}
.lock-username {
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 400;
  color: rgba(255,255,255,.68); letter-spacing: .01em;
}
.lock-divider { width: 100%; height: 1px; background: rgba(255,255,255,.06); }

.lock-pass-wrap { width: 100%; position: relative; display: flex; align-items: center; }
.lock-pass-wrap input {
  width: 100%;
  background: rgba(255,255,255,.055);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 11px;
  padding: 11px 42px 11px 14px;
  color: rgba(255,255,255,.88);
  font-size: 14px; font-family: 'Outfit', sans-serif; font-weight: 300;
  outline: none; text-align: center; letter-spacing: .12em;
  transition: border-color .25s, background .25s, box-shadow .25s;
}
.lock-pass-wrap input:focus {
  border-color: rgba(138,168,204,.5);
  background: rgba(138,168,204,.06);
  box-shadow: 0 0 0 3px rgba(138,168,204,.08);
}
.lock-pass-wrap input::placeholder {
  color: rgba(255,255,255,.2); letter-spacing: .04em; font-size: 13px;
}
.lock-submit {
  position: absolute; right: 9px;
  width: 27px; height: 27px; border-radius: 8px;
  background: rgba(138,168,204,.15);
  border: 1px solid rgba(138,168,204,.2);
  cursor: pointer; color: rgba(255,255,255,.6); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.lock-submit:hover { background: rgba(138,168,204,.3); color: #fff; transform: scale(1.07); }

.lock-hint-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 300;
  color: rgba(255,255,255,.3); cursor: pointer;
  letter-spacing: .05em; padding: 4px 0;
  transition: color .2s;
}
.lock-hint-btn:hover { color: rgba(255,255,255,.58); }

.lock-back {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 300;
  color: rgba(255,255,255,.2); cursor: pointer;
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 10px; padding: 4px 0;
  background: none; border: none;
  opacity: 0;
  transition: opacity .45s ease .15s, color .2s;
}
.lock-back.visible { opacity: 1; }
.lock-back:hover { color: rgba(255,255,255,.45); }

.lock-error {
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 300;
  color: rgba(220,130,110,.9);
  min-height: 14px; text-align: center;
  animation: lockShake .38s ease;
}
@keyframes lockShake {
  0%,100% { transform: translateX(0);    }
  20%      { transform: translateX(-7px); }
  40%      { transform: translateX(6px);  }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(3px);  }
}

@keyframes lockFadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0);    }
}

.color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.3)}
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.wp-opt{height:58px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;overflow:hidden}
.wp-opt:hover{transform:scale(1.05)}
.wp-opt.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,0.28)}
.wp-opt span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,0.8);text-shadow:0 1px 4px rgba(0,0,0,0.9)}
.sett-range-wrap{width:100%;display:flex;align-items:center;gap:10px;margin-top:4px}
.sett-range-wrap input[type=range]{flex:1}
.sett-range-val{font-size:12px;color:rgba(255,255,255,0.5);min-width:36px;text-align:right;font-family:var(--mono)}

/* ── VS CODE TUTORIAL POPUP ─────────────────────────────────── */
.vsc-tut-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0}
.vsc-tut-modal{background:#1e1e2e;border:1px solid rgba(91,138,245,0.35);border-radius:14px;width:420px;max-width:calc(100% - 32px);box-shadow:0 24px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(91,138,245,0.1);overflow:hidden}
.vsc-tut-header{display:flex;align-items:center;gap:8px;padding:14px 16px;background:rgba(91,138,245,0.1);border-bottom:1px solid rgba(255,255,255,0.07);font-size:13px;font-weight:700;color:#fff}
.vsc-tut-icon{font-size:16px}
.vsc-tut-header span:last-of-type{flex:1}
.vsc-tut-close{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:5px;transition:all .15s}
.vsc-tut-close:hover{background:rgba(255,80,80,0.2);color:#ff9090}
.vsc-tut-body{padding:16px}
.vsc-tut-lead{font-size:12px;color:rgba(255,255,255,0.65);margin:0 0 12px;line-height:1.55}
.vsc-tut-lead strong{color:rgba(255,255,255,0.9)}
.vsc-tut-table{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.vsc-tut-row{display:grid;grid-template-columns:58px 44px 1fr;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:7px;border:1px solid rgba(255,255,255,0.06)}
.vsc-tut-lang{font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;text-align:center}
.vsc-tut-lang.html{background:rgba(255,100,50,0.2);color:#ff9060}
.vsc-tut-lang.js{background:rgba(247,197,53,0.2);color:#f7c535}
.vsc-tut-lang.py{background:rgba(52,152,219,0.2);color:#5baaff}
.vsc-tut-lang.css{background:rgba(91,138,245,0.2);color:#8babff}
.vsc-tut-ext{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,0.5)}
.vsc-tut-eg{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,0.35)}
.vsc-tut-steps{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.vsc-tut-step{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.65)}
.vsc-tut-step strong{color:#fff}
.vsc-tut-step kbd{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:1px 5px;font-size:11px;font-family:var(--mono);color:#fff}
.vsc-tut-num{width:20px;height:20px;border-radius:50%;background:rgba(91,138,245,0.3);border:1px solid rgba(91,138,245,0.5);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vsc-tut-note{font-size:11px;color:rgba(255,255,255,0.35);line-height:1.5;margin:0;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:7px;border-left:2px solid rgba(91,138,245,0.4)}
.vsc-tut-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.2)}
.vsc-tut-nosee{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;user-select:none}
.vsc-tut-nosee input{accent-color:var(--accent);cursor:pointer}
.vsc-tut-ok{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;padding:7px 18px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.vsc-tut-ok:hover{filter:brightness(1.15);transform:translateY(-1px)}

/* ── SOCIAL NETWORK ─────────────────────────────────────────── */
.soc-wrap{display:flex;height:100%;overflow:hidden;font-family:var(--font)}
.soc-feed-col{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.07);overflow:hidden}
.soc-side-col{width:280px;flex-shrink:0;overflow-y:auto;background:rgba(0,0,0,0.2);padding:10px}
.soc-compose{display:flex;gap:10px;padding:12px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02)}
.soc-compose-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:600}
.soc-compose-inner{flex:1;display:flex;flex-direction:column;gap:6px}
.soc-compose-ta{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text);font-family:var(--font);font-size:13px;padding:8px 10px;resize:none;outline:none;transition:border-color .15s}
.soc-compose-ta:focus{border-color:rgba(91,138,245,0.5);background:rgba(91,138,245,0.05)}
.soc-compose-toolbar{display:flex;align-items:center;gap:6px}
.soc-img-url{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:var(--text);font-size:11px;padding:5px 8px;outline:none}
.soc-char-count{font-size:10px;color:rgba(255,255,255,0.3);white-space:nowrap}
.soc-post-btn{padding:5px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.soc-post-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.soc-ram-bar-wrap{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(0,0,0,0.15);border-bottom:1px solid rgba(255,255,255,0.05)}
.soc-ram-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.soc-ram-fill{height:100%;border-radius:2px;transition:width .5s ease,background .3s}
.soc-ram-txt{font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap}
.soc-feed-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid rgba(255,255,255,0.05)}
.soc-feed-count{font-size:10px;font-weight:400;color:rgba(255,255,255,0.25)}
.soc-posts{flex:1;overflow-y:auto;padding:6px}
.soc-empty{padding:30px 20px;text-align:center;color:rgba(255,255,255,0.25);font-size:13px}
.soc-post{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 12px;margin-bottom:6px;transition:border-color .15s,background .15s;animation:postIn .25s cubic-bezier(.2,1.2,.3,1)}
.soc-post:hover{border-color:rgba(91,138,245,0.25);background:rgba(91,138,245,0.05)}
@keyframes postIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.soc-post-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.soc-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.soc-post-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1}
.soc-author{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85)}
.soc-author.is-mine{color:var(--accent)}
.soc-time{font-size:10px;color:rgba(255,255,255,0.25);margin-left:auto}
.soc-hop-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(155,89,245,0.2);color:rgba(155,89,245,0.9);border:1px solid rgba(155,89,245,0.2)}
.soc-post-content{font-size:13px;color:rgba(255,255,255,0.82);line-height:1.5;word-break:break-word;white-space:pre-wrap}
.soc-post-img{max-width:100%;border-radius:8px;margin-top:8px;border:1px solid rgba(255,255,255,0.1)}
.soc-load-more{padding:8px 12px;display:flex;justify-content:center}
.soc-load-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,255,255,0.6);font-size:12px;padding:7px 18px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.soc-load-btn:hover{background:rgba(91,138,245,0.15);border-color:rgba(91,138,245,0.3);color:#fff}
.soc-load-btn:disabled{opacity:.4;cursor:default}
.soc-panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;margin-bottom:8px}
.soc-panel-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,0.35);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.soc-identity{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.soc-id-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.soc-id-info{flex:1;min-width:0}
.soc-name-inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-size:13px;font-weight:600;padding:4px 7px;outline:none;width:100%;margin-bottom:5px;font-family:var(--font)}
.soc-peer-id-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.soc-peer-label{font-size:10px;color:rgba(255,255,255,0.3);white-space:nowrap}
.soc-peer-id{font-size:10px;color:var(--accent);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.soc-copy-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:12px;padding:1px 5px;flex-shrink:0;transition:all .15s}
.soc-copy-btn:hover{background:rgba(91,138,245,0.2);color:#fff}
.soc-status-row{display:flex;align-items:center;gap:4px}
.soc-status-dot{width:6px;height:6px;border-radius:50%;background:#28c840;flex-shrink:0}
.soc-color-row{display:flex;gap:5px;flex-wrap:wrap}
.soc-clr-sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.soc-clr-sw:hover{transform:scale(1.15)}
.soc-clr-sw.active{border-color:#fff}
.soc-emoji-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.soc-emoji-sw{width:24px;height:24px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(255,255,255,0.04);transition:all .15s;border:1px solid transparent}
.soc-emoji-sw:hover{background:rgba(91,138,245,0.2)}
.soc-emoji-sw.active{border-color:var(--accent);background:rgba(91,138,245,0.15)}
.soc-connect-row{display:flex;gap:6px}
.soc-peer-inp{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#fff;font-size:11px;padding:6px 8px;outline:none;font-family:var(--mono)}
.soc-connect-btn{background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:600;padding:6px 10px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.soc-connect-btn:hover{filter:brightness(1.15)}
.soc-conn-list{max-height:100px;overflow-y:auto}
.soc-no-conn{font-size:11px;color:rgba(255,255,255,0.25);padding:4px 0}
.soc-conn-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px}
.soc-conn-dot{width:6px;height:6px;border-radius:50%;background:#28c840;flex-shrink:0}
.soc-conn-id{flex:1;font-family:var(--mono);color:rgba(255,255,255,0.7);overflow:hidden;text-overflow:ellipsis}
.soc-conn-disc{background:none;border:none;color:rgba(255,80,80,0.6);cursor:pointer;font-size:11px;padding:0 2px;transition:color .15s}
.soc-conn-disc:hover{color:#ff5f5f}
.soc-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;border-radius:99px;font-size:10px;min-width:16px;height:16px;padding:0 4px;font-weight:700}
.soc-help-text{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.55}
.soc-help-text strong{color:rgba(255,255,255,0.65)}

/* ── SOCIAL MOBILE RESPONSIVE ───────────────────────────────────── */
.soc-mobile-tabs{display:none;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.25)}
.soc-tab-btn{flex:1;padding:11px 6px;border:none;background:none;color:rgba(255,255,255,0.4);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .18s}
.soc-tab-btn.active{color:#fff;border-bottom-color:var(--accent);background:rgba(91,138,245,0.07)}
@media(max-width:680px){
  .soc-mobile-tabs{display:flex}
  .soc-wrap{flex-direction:column;overflow:hidden}
  .soc-feed-col{border-right:none;min-width:0;flex:1}
  .soc-side-col{width:100%;flex-shrink:0}
  .soc-hidden{display:none!important}
}

/* ── RESOURCE MONITOR ───────────────────────────────────────────── */
:root{--rm-accent:#5b8af5}
.rm-wrap{height:100%;display:flex;flex-direction:column;font-family:var(--font);overflow:hidden}
.rm-tabs{display:flex;gap:2px;padding:8px 10px 0;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.rm-tab{padding:6px 14px;border-radius:8px 8px 0 0;font-size:12px;font-weight:600;color:rgba(255,255,255,0.45);cursor:pointer;transition:all .15s}
.rm-tab:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05)}
.rm-tab.active{color:#fff;background:rgba(91,138,245,0.2);border:1px solid rgba(91,138,245,0.3);border-bottom:none}
.rm-panel{flex:1;overflow-y:auto;padding:12px}
.rm-gauge-section{margin-bottom:14px;padding:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px}
.rm-gauge-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.7)}
.rm-gauge-track{height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden;margin-bottom:5px}
.rm-gauge-fill{height:100%;border-radius:5px;transition:width .6s ease,background .3s;background:var(--rm-accent)}
.rm-gauge-sub{font-size:11px;color:rgba(255,255,255,0.35)}
.rm-breakdown{display:flex;height:14px;border-radius:7px;overflow:hidden;gap:1px;margin-bottom:14px;background:rgba(255,255,255,0.06)}
.rm-bk-seg{height:100%;transition:width .5s ease;cursor:default}
.rm-proc-list{display:flex;flex-direction:column;gap:6px}
.rm-proc-row-item{display:grid;grid-template-columns:140px 1fr 60px;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:rgba(255,255,255,0.03)}
.rm-proc-name{font-size:11px;color:rgba(255,255,255,0.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rm-proc-bar-wrap{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.rm-proc-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.rm-proc-mb{font-size:10px;color:rgba(255,255,255,0.4);text-align:right}
.rm-stor-list{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.rm-stor-row{display:grid;grid-template-columns:140px 1fr 64px;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;background:rgba(255,255,255,0.025)}
.rm-stor-key{font-size:10px;color:rgba(255,255,255,0.5);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rm-stor-bar-wrap{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.rm-stor-bar-fill{height:100%;background:#28c840;border-radius:2px;transition:width .4s}
.rm-stor-size{font-size:10px;color:rgba(255,255,255,0.35);text-align:right;font-family:var(--mono)}
.rm-clean-btn{margin:12px 0 0;padding:7px 16px;border-radius:8px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,80,80,0.08);color:rgba(255,130,130,0.8);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s}
.rm-clean-btn:hover{background:rgba(255,80,80,0.18);color:#fff}
.rm-proc-table{width:100%}
.rm-proc-row{display:grid;grid-template-columns:1fr 70px 70px;gap:6px;padding:6px 8px;border-radius:7px;font-size:12px;align-items:center}
.rm-proc-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.3);margin-bottom:4px;background:none!important}
.rm-proc-row:not(.rm-proc-head){background:rgba(255,255,255,0.03);margin-bottom:3px}
.rm-proc-running{font-size:10px;color:#28c840}
.rm-empty{padding:16px 0;text-align:center;font-size:12px;color:rgba(255,255,255,0.25)}

/* ── DESKTOP GRID OVERLAY ────────────────────────────────────── */
#desktop-grid-overlay{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s}
#desktop-grid-overlay.show{opacity:1}
</style>

function ensureAppImage(imgEl,path,icoKey){
  if(!path){imgEl.onerror?.();return;}
  fetch(path,{method:'GET'}).then(r=>{if(r.ok){imgEl.src=path;}else throw new Error('not ok');}).catch(()=>{const d=document.createElement('div');d.style.cssText=`width:${imgEl.width}px;height:${imgEl.height}px;display:flex;align-items:center;justify-content:center`;d.innerHTML=ICO[icoKey]?ICO[icoKey]():SVG_FALLBACK;imgEl.replaceWith(d);});
}

const OS={volume:80,accent:'#5b8af5',accent2:'#9b59f5',nightLight:false,animations:true,fontSize:14,lockAfter:0,password:'',usePassword:false,username:'User',avatar:null};

function setAccent(c1,c2){document.documentElement.style.setProperty('--accent',c1);if(c2)document.documentElement.style.setProperty('--accent2',c2);OS.accent=c1;if(c2)OS.accent2=c2;autoSave();}

function syncAvatar(){
  const smAv=document.getElementById('sm-av');
  if(smAv){
    if(OS.avatar){smAv.innerHTML='';const img=document.createElement('img');img.src=OS.avatar;img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';smAv.appendChild(img);}
    else{smAv.innerHTML=SVG_FALLBACK;}
  }
  syncLockScreen();
}

function syncLockScreen(){
  const unameEl=document.querySelector('.lock-username');
  if(unameEl)unameEl.textContent=OS.username||'User';
  const lockAvEl=document.getElementById('lock-av-el');
  if(lockAvEl){
    if(OS.avatar){
      lockAvEl.innerHTML='';
      const img=document.createElement('img');
      img.src=OS.avatar;
      img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
      lockAvEl.appendChild(img);
    }else{
      lockAvEl.innerHTML=SVG_FALLBACK;
    }
  }
}
function setNightLight(on){OS.nightLight=on;let el=document.getElementById('nightlight-ol');if(on&&!el){el=document.createElement('div');el.id='nightlight-ol';el.style.cssText='position:fixed;inset:0;background:rgba(255,110,0,0.11);pointer-events:none;z-index:799;mix-blend-mode:multiply';document.body.appendChild(el);}else if(!on&&el)el.remove();autoSave();}

// ── FULL PERSISTENCE SYSTEM ───────────────────────────────────────
const LS_KEY='huebit-os-v2';

// ── BUILD VERSION ─────────────────────────────────────────────
// Bump this string every time you update system files (readme,
// changelog, dev-notes, etc). loadAutoSave() will patch only
// the SYSTEM_FILES paths in localStorage and leave everything
// else (user files, settings, wallpaper) completely untouched.
const BUILD_VERSION='1.4.6b';

let customWallpaperData=null;

function autoSave(){
  try{
    const state={v:2,buildVersion:BUILD_VERSION,OS,FS:JSON.parse(JSON.stringify(FS)),curWP,customWP:customWallpaperData,iconPositions:getIconPositions()};
    localStorage.setItem(LS_KEY,JSON.stringify(state));
  }catch(e){
    try{
      const fsSafe=stripBlobsFromFS(JSON.parse(JSON.stringify(FS)));
      localStorage.setItem(LS_KEY,JSON.stringify({v:2,buildVersion:BUILD_VERSION,OS,FS:fsSafe,curWP,customWP:null,iconPositions:{}}));
    }catch(e2){}
  }
}

function stripBlobsFromFS(node){
  if(!node)return node;
  if(node.type==='file'&&node.blobUrl&&node.blobUrl.startsWith('data:'))return{...node,blobUrl:null};
  if(node.children){const ch={};for(const[k,v]of Object.entries(node.children))ch[k]=stripBlobsFromFS(v);return{...node,children:ch};}
  return node;
}

function getIconPositions(){
  const pos={};
  document.querySelectorAll('.desk-icon').forEach(el=>{const id=el.dataset.id||el.querySelector('span')?.textContent;if(id)pos[id]={left:el.style.left,top:el.style.top};});
  return pos;
}

function loadAutoSave(){
  const saved=localStorage.getItem(LS_KEY);if(!saved)return;
  try{
    const state=JSON.parse(saved);if(!state||state.v!==2)return;
    if(state.OS)Object.assign(OS,state.OS);
    if(state.FS){
      function deepMergeFS(target,source){
        if(!source||!target)return;
        if(source.children&&target.children){for(const[k,v]of Object.entries(source.children)){if(target.children[k]&&target.children[k].type==='dir'&&v.type==='dir')deepMergeFS(target.children[k],v);else target.children[k]=v;}}
      }
      deepMergeFS(FS['/'],state.FS['/']);
    }
    if(state.curWP)curWP=state.curWP;
    if(state.customWP){
      customWallpaperData=state.customWP;
      const ci=WP_THEMES.findIndex(w=>w.key==='custom');
      const cwp={key:'custom',label:'Custom',img:null,bg:'url('+state.customWP+') center/cover no-repeat'};
      if(ci>=0)WP_THEMES[ci]=cwp;else WP_THEMES.push(cwp);
    }
    // ── System file patch on version change ──────────────────
    // If the saved build version is older (or missing), overwrite
    // only the OS-owned paths with the latest content from the
    // current build. User files in all other locations are untouched.
    if(state.buildVersion !== BUILD_VERSION){
      const sysFiles = getSystemFiles();
      for(const [path, node] of Object.entries(sysFiles)){
        fsPatch(path, node);
      }
      console.info(`[HueBit] System files patched: ${state.buildVersion||'legacy'} → ${BUILD_VERSION}`);
      // autoSave runs below after everything is applied, so the new
      // buildVersion will be written to localStorage automatically.
    }
    setAccent(OS.accent,OS.accent2);setNightLight(OS.nightLight);setWallpaper(curWP);renderDesktopFsIcons();if(OS.avatar)setTimeout(syncAvatar,50);
    // Always persist the current state (captures buildVersion update)
    setTimeout(autoSave, 100);
    if(state.iconPositions)setTimeout(()=>{document.querySelectorAll('.desk-icon').forEach(el=>{const id=el.dataset.id||el.querySelector('span')?.textContent;if(id&&state.iconPositions[id]){el.style.left=state.iconPositions[id].left;el.style.top=state.iconPositions[id].top;}});},200);
  }catch(e){console.error('HueBit loadAutoSave:',e);}
}

// Helper: set a file at an absolute FS path, creating parent dirs as needed
function fsPatch(path, node){
  const parts=path.replace(/^\/+/,'').split('/').filter(Boolean);
  const fname=parts.pop();
  let cur=FS['/'];
  for(const seg of parts){
    if(!cur.children[seg]) cur.children[seg]={type:'dir',children:{}};
    cur=cur.children[seg];
  }
  cur.children[fname]=node;
}

function fsGet(path){if(!path||path==='/')return FS['/'];const parts=path.replace(/^\/+/,'').split('/').filter(Boolean);let n=FS['/'];for(const p of parts){if(!n?.children?.[p])return null;n=n.children[p];}return n;}

const FS_CHANGE_LISTENERS=new Set();
function onFsChange(fn){FS_CHANGE_LISTENERS.add(fn);return()=>FS_CHANGE_LISTENERS.delete(fn);}
function emitFsChange(path){for(const fn of FS_CHANGE_LISTENERS)try{fn(path);}catch(e){}}
function fsWriteFile(path,content,icon='file_txt'){const node=fsGet(path);if(node&&node.type==='file'){node.content=content;}else{const parts=path.replace(/^\/+/,'').split('/').filter(Boolean);const fname=parts.pop();let cur=FS['/'];for(const seg of parts){if(!cur.children)cur.children={};if(!cur.children[seg])cur.children[seg]={type:'dir',children:{}};cur=cur.children[seg];}
    const fcur = cur.children || (cur.children = {});
    fcur[fname] = {type:'file',icon,content};
  }
  emitFsChange(path);
}

function extIcon(ext){if(IMG_EXT.includes(ext))return'file_img';if(VID_EXT.includes(ext))return'file_video';if(AUD_EXT.includes(ext))return'file_music';if(TXT_EXT.includes(ext))return'file_txt';return'file_bin';}

async function loadManifest(){try{const res=await fetch('./public/manifest.json');if(!res.ok)return;const manifest=await res.json();const folders=Object.keys(manifest).filter(k=>k!=='_readme');let loaded=0;for(const folder of folders){const files=manifest[folder];if(!Array.isArray(files)||!files.length)continue;const folderNode=fsGet('/'+folder);if(!folderNode?.children)continue;for(const filename of files){if(folderNode.children[filename])continue;const ext=filename.split('.').pop().toLowerCase();const url=`./public/${folder}/${filename}`;if(TXT_EXT.includes(ext)){try{const r=await fetch(url);if(r.ok){const content=await r.text();folderNode.children[filename]={type:'file',icon:'file_txt',content};loaded++;}}catch(e){}}else{folderNode.children[filename]={type:'file',icon:extIcon(ext),blobUrl:url,content:null};if(folder==='Desktop'&&AUD_EXT.includes(ext)){const mNode=fsGet('/Music');if(mNode?.children&&!mNode.children[filename]){mNode.children[filename]={type:'file',icon:'file_music',blobUrl:url,content:null};}}loaded++;}}}if(loaded>0){renderDesktopFsIcons();}}catch(e){}}

function showOpenDialog(onSelected){
  const ov=document.createElement('div');
  ov.className='save-overlay';
  ov.innerHTML=`<div class="save-modal"><div class="save-modal-hd"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:middle;margin-right:5px"><path d="M3 7h18M7 7v12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V7"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Open File</div><div class="save-modal-body"><div class="save-label">Location</div><div class="open-path" id="open-path" style="font-size:12px;padding:4px 10px;background:rgba(0,0,0,0.1);border-radius:4px;margin-bottom:10px"></div><div class="open-files" id="open-files" style="max-height:260px;overflow:auto"></div></div><div class="save-modal-ft"><button class="save-action cancel" id="open-cancel">Cancel</button><button class="save-action confirm" id="open-ok">Open</button></div></div>`;
  document.body.appendChild(ov);

  let cwd='/';
  let sel=null;

  const fileListEl = ov.querySelector('#open-files');
  const pathEl = ov.querySelector('#open-path');
  const okBtn = ov.querySelector('#open-ok');

  const render = () => {
    const node = fsGet(cwd);
    const entries = node?.children ? Object.entries(node.children) : [];
    const segs = cwd==='/'?['/']: cwd.split('/').filter(Boolean);
    pathEl.textContent = segs.join('/') || '/';
    fileListEl.innerHTML = '';
    const sorted = entries.filter(([,v])=>v).sort(([a,av],[b,bv])=>{
      if(av.type!==bv.type) return av.type==='dir'?-1:1;
      return a.localeCompare(b);
    });
    if(sorted.length===0){
      fileListEl.innerHTML = '<div style="padding:14px;color:rgba(255,255,255,0.55);">(empty folder)</div>';
    }
    sorted.forEach(([name,item])=>{
      const el = document.createElement('div');
      el.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .12s;';
      el.onmouseenter = () => el.style.background='rgba(255,255,255,0.08)';
      el.onmouseleave = () => el.style.background='';
      const icon = document.createElement('div');
      icon.style.width='24px'; icon.style.height='24px';
      const iconKey = item.icon || (item.type==='dir' ? 'folder' : 'file_txt');
      icon.innerHTML = (SI[iconKey] || SI.fileGeneric);
      const text = document.createElement('div');
      text.style.flex='1';
      text.style.fontSize='13px';
      text.textContent = name;
      el.appendChild(icon);
      el.appendChild(text);
      el.onclick = () => {
        fileListEl.querySelectorAll('div').forEach(x=>x.style.background='');
        el.style.background='rgba(0,122,204,0.18)';
        sel = {name, item};
      };
      el.ondblclick = () => {
        if(item.type==='dir'){
          cwd = cwd==='/'?`/${name}`:`${cwd}/${name}`;
          sel = null;
          render();
        } else {
          openSelected();
        }
      };
      fileListEl.appendChild(el);
    });
  };

  const openSelected = () => {
    if(!sel || sel.item.type!=='file') return;
    if(sel.item.content===null||sel.item.content===undefined){
      toast('','Unable to open',`Could not load "${sel.name}" (unsupported or missing content).`);
      return;
    }
    const fullPath = cwd==='/'?`/${sel.name}`:`${cwd}/${sel.name}`;
    onSelected(fullPath, sel.name, sel.item.content);
    ov.remove();
  };

  ov.querySelector('#open-cancel').onclick = () => ov.remove();
  okBtn.onclick = openSelected;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});

  render();
}

  function onMount(win){let cwd=startPath,sel=null;const pEl=win.querySelector('#xpath'),fEl=win.querySelector('#xfiles'),sEl=win.querySelector('#xstat');const bkBtn=win.querySelector('#xback'),fdBtn=win.querySelector('#xfwd'),upBtn=win.querySelector('#xup');const hist=[cwd];let hi=0;function nav(p){const n=fsGet(p);if(!n||n.type!=='dir')return;cwd=p;if(hi<hist.length-1)hist.splice(hi+1);if(hist[hist.length-1]!==p){hist.push(p);hi=hist.length-1;}render();}function render(){sel=null;const segs=cwd==='/'?['/']: cwd.split('/').filter(Boolean);pEl.innerHTML=segs.map((s,i)=>{const p=i===0&&segs.length===1?'/':'/'+segs.slice(0,i+1).join('/');return(i>0?'<span class="exp-sep2"> › </span>':'')+`<span class="exp-seg" data-p="${p}">${s==='/'?'Home':s}</span>`;}).join('');pEl.querySelectorAll('.exp-seg').forEach(e=>e.onclick=()=>nav(e.dataset.p));win.querySelectorAll('.exp-nav').forEach(n=>n.classList.toggle('active',n.dataset.p===cwd));bkBtn.disabled=hi===0;fdBtn.disabled=hi===hist.length-1;upBtn.disabled=cwd==='/';const node=fsGet(cwd);fEl.innerHTML='';const ents=node?.children?Object.entries(node.children):[];sEl.textContent=ents.length?`${ents.length} item${ents.length!==1?'s':''}`:'Empty folder';if(!ents.length){fEl.innerHTML='<div class="exp-empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><br>This folder is empty</div>';return;}ents.sort(([a,av],[b,bv])=>av.type!==bv.type?(av.type==='dir'?-1:1):a.localeCompare(b)).forEach(([name,item])=>{const el=document.createElement('div');el.className='exp-item';const iconFn=ICO[item.icon||(item.type==='dir'?'folder':'file_txt')];const ext=name.split('.').pop().toLowerCase();let imgHtml='';if((item.blobUrl||item.src)&&IMG_EXT.includes(ext)){imgHtml=`<div class="ei-img"><img src="${item.blobUrl||item.src}" style="width:40px;height:40px;object-fit:cover;border-radius:4px"></div>`;}else{imgHtml=`<div class="ei-img">${iconFn?iconFn():''}</div>`;}el.innerHTML=`${imgHtml}<div class="exp-item-name">${name}</div>`;el.onclick=()=>{fEl.querySelectorAll('.exp-item').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');sel=name;sEl.textContent=`${ents.length} items · "${name}" selected`;};el.ondblclick=()=>{if(item.type==='dir')nav(cwd==='/'?'/'+name:cwd+'/'+name);else routeOpen(name,item,cwd);};el.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();ctxMenu(e.clientX,e.clientY,[{label:'Open',fn:()=>item.type==='dir'?nav(cwd==='/'?'/'+name:cwd+'/'+name):routeOpen(name,item,cwd)},{sep:true},{label:'Delete',fn:()=>{const p=fsGet(cwd);if(p?.children){delete p.children[name];if(cwd==='/Desktop')renderDesktopFsIcons();render();autoSave();toast('','Deleted',`"${name}" removed.`);}},danger:true}]);});fEl.appendChild(el);});}bkBtn.onclick=()=>{if(hi>0){hi--;cwd=hist[hi];render();}};fdBtn.onclick=()=>{if(hi<hist.length-1){hi++;cwd=hist[hi];render();}};upBtn.onclick=()=>{if(cwd!=='/')nav(cwd.split('/').slice(0,-1).join('/')||'/');};win.querySelectorAll('.exp-nav').forEach(n=>n.addEventListener('click',()=>nav(n.dataset.p)));nav(startPath);}

// ── TEXT EDITOR (multi-tab) ───────────────────────────────────────
function buildNotepad(opts){
  const initFn=opts?.filename||'untitled.txt', initContent=opts?.initial||'', initFsPath=opts?.fsPath||null;

  const content=`<div class="ed-wrap" style="display:flex;flex-direction:column;height:100%">
    <div id="ed-tabbar" style="display:flex;align-items:center;gap:0;background:rgba(0,0,0,0.22);border-bottom:1px solid rgba(255,255,255,0.07);overflow-x:auto;flex-shrink:0;scrollbar-width:none;min-height:36px"></div>
    <div class="ed-toolbar" style="flex-shrink:0">
      <button class="ed-btn" id="ed-new-tab" title="New Tab (Ctrl+T)">${SI.plus}</button>
      <div style="width:1px;height:18px;background:rgba(255,255,255,0.1);margin:0 4px;flex-shrink:0"></div>
      <button class="ed-btn" id="ed-save">Save</button>
      <button class="ed-btn" id="ed-saveas">Save As…</button>
      <span class="ed-fname" id="ed-fn">${initFn}</span>
      <div class="ed-status" id="ed-stat">Ln 1, Col 1</div>
    </div>
    <div id="ed-ta-wrap" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
      <textarea class="ed-ta" id="ed-ta" spellcheck="false" placeholder="Start typing…" style="flex:1;min-height:0"></textarea>
    </div>
  </div>`;

  function onMount(win){
    const tabbar=win.querySelector('#ed-tabbar');
    const ta=win.querySelector('#ed-ta');
    const stat=win.querySelector('#ed-stat');
    const fnEl=win.querySelector('#ed-fn');

    // ── tab state ──
    let tabs=[];  // [{id, name, content, fsPath, dirty}]
    let activeId=null;
    let _tid=0;
    const mkId=()=>'t'+(++_tid);

    const addTab=(name,content,fsPath)=>{
      const id=mkId();
      tabs.push({id,name,content,fsPath,dirty:false});
      renderTabs();
      switchTab(id);
      return id;
    };

    const renderTabs=()=>{
      tabbar.innerHTML='';
      tabs.forEach(t=>{
        const el=document.createElement('div');
        el.style.cssText='display:flex;align-items:center;gap:6px;padding:0 10px 0 12px;height:36px;cursor:pointer;border-right:1px solid rgba(255,255,255,0.07);white-space:nowrap;flex-shrink:0;font-size:12px;font-family:var(--font);color:rgba(255,255,255,0.55);transition:background .12s;min-width:80px;max-width:160px;position:relative';
        if(t.id===activeId) el.style.cssText+=';background:rgba(255,255,255,0.07);color:#fff;border-bottom:2px solid var(--accent)';
        const nameSpan=document.createElement('span');
        nameSpan.textContent=(t.dirty?'● ':'')+t.name;
        nameSpan.style.cssText='overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0';
        const closeBtn=document.createElement('button');
        closeBtn.innerHTML=SI.close;
        closeBtn.style.cssText='background:none;border:none;color:rgba(255,255,255,0.35);cursor:pointer;display:flex;align-items:center;padding:2px;border-radius:3px;flex-shrink:0;transition:color .12s';
        closeBtn.title='Close tab (Ctrl+W)';
        closeBtn.onmouseenter=()=>closeBtn.style.color='rgba(255,255,255,0.85)';
        closeBtn.onmouseleave=()=>closeBtn.style.color='rgba(255,255,255,0.35)';
        closeBtn.onclick=ev=>{ev.stopPropagation();closeTab(t.id);};
        el.appendChild(nameSpan);
        el.appendChild(closeBtn);
        el.onclick=()=>switchTab(t.id);
        tabbar.appendChild(el);
      });
    };

    const switchTab=(id)=>{
      // save current textarea content to current tab
      if(activeId){
        const cur=tabs.find(t=>t.id===activeId);
        if(cur) cur.content=ta.value;
      }
      activeId=id;
      const t=tabs.find(t=>t.id===id);
      if(!t) return;
      ta.value=t.content;
      fnEl.textContent=t.name;
      renderTabs();
      upd();
      ta.focus();
    };

    const closeTab=(id)=>{
      const idx=tabs.findIndex(t=>t.id===id);
      if(idx===-1) return;
      tabs.splice(idx,1);
      if(tabs.length===0){
        // always keep at least one tab
        addTab('untitled.txt','',null);
        return;
      }
      if(activeId===id){
        const newIdx=Math.min(idx, tabs.length-1);
        switchTab(tabs[newIdx].id);
      } else {
        renderTabs();
      }
    };

    const upd=()=>{
      const v=ta.value;
      const lines=v.substr(0,ta.selectionStart).split('\n');
      stat.textContent=`Ln ${lines.length}, Col ${lines[lines.length-1].length+1}  |  ${v.length} ch`;
      // mark dirty
      const cur=tabs.find(t=>t.id===activeId);
      if(cur){
        const origDirty=cur.dirty;
        cur.dirty = (cur.fsPath ? v !== (cur._savedContent||'') : v !== '');
        if(cur.dirty!==origDirty) renderTabs();
      }
    };

    const doSave=()=>{
      const cur=tabs.find(t=>t.id===activeId);
      if(!cur) return;
      cur.content=ta.value;
      if(cur.fsPath){
        fsWriteFile(cur.fsPath, ta.value);
        cur.dirty=false; cur._savedContent=ta.value;
        renderTabs(); toast('','Saved',`"${cur.fsPath.split('/').pop()}" updated.`); return;
      }
      showSaveDialog(cur.name,()=>ta.value,(dir,name)=>{
        cur.fsPath='/'+dir+'/'+name;
        fsWriteFile(cur.fsPath, ta.value);
        cur.name=name; cur.dirty=false; cur._savedContent=ta.value;
        fnEl.textContent=name; renderTabs();
      });
    };

    // ── boot first tab ──
    addTab(initFn, initContent, initFsPath);
    const firstTab=tabs[0];
    firstTab._savedContent=initContent;

    // ── new tab button ──
    win.querySelector('#ed-new-tab').onclick=()=>addTab('untitled.txt','',null);

    // ── save buttons ──
    win.querySelector('#ed-save').onclick=doSave;
    win.querySelector('#ed-saveas').onclick=()=>{
      const cur=tabs.find(t=>t.id===activeId);
      if(!cur) return;
      showSaveDialog(cur.name,()=>ta.value,(dir,name)=>{
        cur.fsPath='/'+dir+'/'+name;
        cur.name=name; cur.dirty=false; cur._savedContent=ta.value;
        fnEl.textContent=name; renderTabs();
      });
    };

    // ── textarea events ──
    ta.addEventListener('input',upd);
    ta.addEventListener('click',upd);
    ta.addEventListener('keyup',upd);

    // ── keyboard shortcuts ──
    win.addEventListener('keydown',e=>{
      if(e.key==='s'&&(e.ctrlKey||e.metaKey)){e.preventDefault();doSave();}
      else if(e.key==='t'&&(e.ctrlKey||e.metaKey)){e.preventDefault();addTab('untitled.txt','',null);}
      else if(e.key==='w'&&(e.ctrlKey||e.metaKey)){e.preventDefault();if(activeId)closeTab(activeId);}
    });

    ta.focus();
  }
  return{content,onMount};
}

// ── SIMPLE PYTHON INTERPRETER ───────────────────────────────────
function simplePythonRun(code){
  let output='';
  const vars={};
  const lines=code.split('\n');
  const printVal=(v)=>{
    if(typeof v==='string')return v;
    if(Array.isArray(v))return '['+v.map(printVal).join(', ')+']';
    return String(v);
  };
  for(let i=0;i<lines.length;i++){
    const raw=lines[i];
    const line=raw.trimEnd();
    if(!line||line.trimStart().startsWith('#'))continue;
    const trimmed=line.trimStart();
    // print(...)
    if(trimmed.startsWith('print(')){
      const inner=trimmed.slice(6,-1).trim();
      // Handle f-strings simply
      let val=inner;
      if((inner.startsWith('"')&&inner.endsWith('"'))||(inner.startsWith("'")&&inner.endsWith("'")))
        val=inner.slice(1,-1).replace(/\{(\w+)\}/g,(_,k)=>vars[k]!==undefined?printVal(vars[k]):k);
      else if(vars[inner]!==undefined) val=printVal(vars[inner]);
      else try{val=printVal(eval(inner.replace(/\b(\w+)\b/g,(_,k)=>vars[k]!==undefined?JSON.stringify(vars[k]):k)));}catch(e){val=inner;}
      output+=val+'\n';
    }
    // variable assignment (simple)
    else if(/^\w+\s*=\s*.+/.test(trimmed)&&!trimmed.startsWith('if')&&!trimmed.startsWith('for')&&!trimmed.startsWith('while')){
      const eqIdx=trimmed.indexOf('=');
      const varName=trimmed.slice(0,eqIdx).trim();
      const rawVal=trimmed.slice(eqIdx+1).trim();
      if((rawVal.startsWith('"')&&rawVal.endsWith('"'))||(rawVal.startsWith("'")&&rawVal.endsWith("'")))
        vars[varName]=rawVal.slice(1,-1);
      else if(!isNaN(rawVal)) vars[varName]=Number(rawVal);
      else if(rawVal==='True') vars[varName]=true;
      else if(rawVal==='False') vars[varName]=false;
      else vars[varName]=rawVal;
    }
    else if(trimmed.startsWith('import ')){const mod=trimmed.split(' ')[1];output+=`# import ${mod} (simulated)\n`;}
    // skip unsupported
  }
  return output||'(no output)';
}

// ── SHARED TERMINAL SHELL ─────────────────────────────────────────
function createShell(outEl, inputEl, onPrompt, extraCmds){
  let cwd='/', hist=[], hi=-1;
  const ln = (text, cls='') => {
    const d = document.createElement('div');
    if(cls) d.className = 'term-line '+cls;
    d.textContent = text;
    outEl.appendChild(d);
    outEl.scrollTop = outEl.scrollHeight;
  };
  const lnh = (html) => {
    const d = document.createElement('div');
    d.className = 'term-line';
    d.innerHTML = html;
    outEl.appendChild(d);
    outEl.scrollTop = outEl.scrollHeight;
  };
  const getPrompt = () => {
    if(typeof onPrompt === 'function') return onPrompt(cwd);
    return '$ ';
  };
  const updatePrompt = () => { getPrompt(); };

  const CMD = {
    help(){ lnh('<span style="color:#5b8af5;font-weight:700">Commands</span>');
      [['help','Show help'],['ls','List directory'],['cd [dir]','Change directory'],['pwd','Working dir'],['clear','Clear output'],['echo [text]','Print text'],['cat [file]','Read file'],['mkdir [name]','Create directory'],['touch [name]','Create file'],['rm [name]','Remove file/dir'],['whoami','User info'],['date','Date & time'],['uname','OS info'],['neofetch','System info'],['calc [expr]','Evaluate math'],['open [app]','Open app'],['run','Run current file'],['python [code]','Run Python'],['history','Command history']].forEach(([c,d])=>lnh(`  <span style="color:#78e0a0;display:inline-block;min-width:130px">${c}</span><span style="color:rgba(255,255,255,0.4)">${d}</span>`));
    },
    ls(){CMD.dir();},
    dir(){const n=fsGet(cwd);if(!n?.children){ln('Not a directory','err');return;}const e=Object.entries(n.children);if(!e.length){ln('(empty)','info');return;}e.forEach(([nm,it])=>lnh(`  ${it.type==='dir'?`<span style="color:#5b8af5">${SI.folder} ${nm}/</span>`:`<span style="color:rgba(255,255,255,0.75)">${SI.fileGeneric} ${nm}</span>`}`));ln(`<span style="color:rgba(255,255,255,0.3)">  ${e.length} item${e.length!==1?'s':''}</span>`);},
    cd(a){const t=a[0];if(!t||t==='~'){cwd='/';updatePrompt();return;}if(t==='..'){cwd=cwd.split('/').slice(0,-1).join('/')||'/';updatePrompt();return;}const np=t.startsWith('/')?t:(cwd==='/'?'/'+t:cwd+'/'+t);const n=fsGet(np);if(!n)ln(`cd: ${t}: No such file or directory`,'err');else if(n.type!=='dir')ln(`cd: ${t}: Not a directory`,'err');else{cwd=np;updatePrompt();}},
    pwd(){ln(cwd);},
    clear(){init();},
    echo(a){ln(a.join(' '));},
    whoami(){ln('user  [uid=1000  groups=admin,users]');},
    date(){ln(new Date().toString());},
    uname(){ln('HueBit OS 1.4.6 (HTML5/JS) x86_64');},
    history(){hist.forEach((c,i)=>ln(`  ${String(hist.length-i).padStart(4,' ')}  ${c}`,'info'));},
    cat(a){if(!a[0]){ln('Usage: cat <file>','err');return;}const p=a[0].startsWith('/')?a[0]:(cwd==='/'?'/'+a[0]:cwd+'/'+a[0]);const n=fsGet(p);if(!n)ln(`cat: ${a[0]}: No such file`,'err');else if(n.type==='dir')ln(`cat: ${a[0]}: Is a directory`,'err');else if(!n.content)ln(`cat: ${a[0]}: Binary/media file`,'err');else n.content.split('\n').forEach(l=>ln(l));},
    mkdir(a){if(!a[0]){ln('Usage: mkdir <n>','err');return;}const p=fsGet(cwd);if(p?.children){p.children[a[0]]={type:'dir',children:{}};ln(`Created '${a[0]}'`,'ok');}},
    touch(a){if(!a[0]){ln('Usage: touch <n>','err');return;}const p=fsGet(cwd);if(p?.children){p.children[a[0]]={type:'file',icon:'file_txt',content:''};ln(`Created '${a[0]}'`,'ok');if(cwd==='/Desktop')renderDesktopFsIcons();autoSave();}},
    rm(a){if(!a[0]){ln('Usage: rm <n>','err');return;}const p=fsGet(cwd);if(p?.children?.[a[0]]){delete p.children[a[0]];ln(`Removed '${a[0]}'`,'ok');if(cwd==='/Desktop')renderDesktopFsIcons();autoSave();}else ln(`rm: ${a[0]}: No such file`,'err');},
    open(a){if(APPS_CFG[a[0]]){openApp(a[0]);ln(`Opening ${a[0]}...`,'ok');}else ln(`open: '${a[0]||''}': Unknown app`,'err');},
    python(a){if(!a[0]){ln('Usage: python <code>','err');return;}try{const r=simplePythonRun(a.join(' '));r.split('\n').forEach(l=>ln(l));}catch(e){ln('Error: '+e.message,'err');}},
    calc(a){if(!a[0]){ln('Usage: calc <expr>','err');return;}try{const r=(new Function(`"use strict";return(${a.join(' ').replace(/[^0-9+\-*/.() \^%]/g,'').replace(/\^/g,'**')})`)());lnh(`<span style="color:rgba(255,255,255,0.5)">${a.join(' ')} = </span><span style="color:#78e0a0">${r}</span>`);}catch{ln('Invalid expression','err');}},
    neofetch(){['<span style="color:#5b8af5">  ██╗  ██╗██╗   ██╗███████╗</span>  <b style="color:#9b59f5">user</b>@<b style="color:#5b8af5">huebit</b>','<span style="color:#5b8af5">  ██║  ██║██║   ██║██╔════╝</span>  ──────────────','<span style="color:#5b8af5">  ███████║██║   ██║█████╗  </span>  <span style="color:#9b59f5">OS</span>: HueBit OS 1.4.6','<span style="color:#5b8af5">  ██╔══██║██║   ██║██╔══╝  </span>  <span style="color:#9b59f5">Shell</span>: hsh 1.4','<span style="color:#5b8af5">  ██║  ██║╚██████╔╝███████╗</span>  <span style="color:#9b59f5">Resolution</span>: '+window.innerWidth+'×'+window.innerHeight,'<span style="color:#5b8af5">  ╚═╝  ╚═╝ ╚═════╝ ╚══════╝</span>  <span style="color:#9b59f5">Theme</span>: Aurora Dark'].forEach(lnh);},
  };
  Object.assign(CMD, extraCmds||{});

  const init = () => {
    outEl.innerHTML='';
    updatePrompt();
    ln('HueBit Shell  v1.4.6','acc');
    ln('Type "help" for commands.','info');
    ln('');
  };

  const run = (raw) => {
    if(!raw) return;
    hist.unshift(raw);
    hi = -1;
    lnh(`<span style="color:#5b8af5">${getPrompt()}</span><span style="color:#a0c8ff">${raw}</span>`);
    const [c,...a] = raw.trim().split(/\s+/);
    if(CMD[c]) CMD[c](a);
    else ln(`${c}: command not found (try "help")`,'err');
  };

  const onKey = (e) => {
    if(e.key==='Enter'){ const r=inputEl.value.trim(); if(!r) return; run(r); inputEl.value=''; }
    else if(e.key==='ArrowUp'){ hi=Math.min(hi+1,hist.length-1); inputEl.value=hist[hi]||''; e.preventDefault(); }
    else if(e.key==='ArrowDown'){ hi=Math.max(hi-1,-1); inputEl.value=hi=== -1?'':hist[hi]; e.preventDefault(); }
    else if(e.key==='Tab'){ e.preventDefault(); const pts=inputEl.value.split(' '); const part=pts.pop(); const n=fsGet(cwd); if(n?.children){ const m=Object.keys(n.children).filter(k=>k.startsWith(part)); if(m.length===1){ pts.push(m[0]); inputEl.value=pts.join(' ')+' '; } } }
    else if(e.key==='c'&&e.ctrlKey){ ln('^C','info'); inputEl.value=''; }
  };

  if(inputEl) inputEl.addEventListener('keydown', onKey);
  outEl.addEventListener('click',()=>{ if(inputEl) inputEl.focus(); });

  init();

  return { run, clear: init };
}

// ── VS CODE LIGHT EDITOR ──────────────────────────────────────────
function buildVSCode(opts){
  const initialFile = opts?.filename || 'untitled.txt';
  const initialContent = opts?.initial !== undefined ? opts.initial : '// This editor supports: Python, JS, HTML, and CSS\n';
  let savedFsPath = opts?.fsPath || null;
  let currentFileName = initialFile;

  const content = `<div class="vscode-wrap" style="position:relative;overflow:visible">
    <div class="vscode-menu" id="vsc-menubar">
      <div class="menu-item" data-menu="file">File</div>
      <div class="menu-item" data-menu="edit">Edit</div>
