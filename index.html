<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HueBit OS</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- ── DESKTOP ────────────────────────────────────────────────── -->
<div id="desktop">
  <div id="wallpaper"></div>
  <div id="wallpaper-overlay"></div>
  <div id="aurora"></div>
  <canvas id="stars-canvas"></canvas>
  <div id="icon-area"></div>
</div>

<!-- ── DROP ZONE ──────────────────────────────────────────────── -->
<div id="drop-zone">
  <div class="dz-box">
    <div class="dz-ico" id="dz-ico-el"></div>
    <div class="dz-title">Drop files here</div>
    <div class="dz-sub">Images, videos, audio, and text files are supported</div>
  </div>
</div>

<!-- ── TASKBAR ────────────────────────────────────────────────── -->
<div id="tb-wrap">
  <div id="taskbar">
    <div id="start-btn">
      <img src="./public/logo.png" alt="HueBit" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="sb-fb">⬡</span>
    </div>
    <div class="tb-div"></div>
    <div id="tb-apps"></div>
    <div class="tb-div"></div>
    <div id="sys-tray">
      <div class="tray-ico" id="tray-vol"></div>
      <div id="clock-tray"></div>
    </div>
  </div>
</div>

<!-- ── VOLUME POPUP ───────────────────────────────────────────── -->
<div id="vol-popup" class="vol-popup">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <span id="vol-low-ico" style="opacity:.6"></span>
    <input type="range" id="vol-range" class="hb-range" min="0" max="100" value="80" style="flex:1">
  </div>
  <div style="text-align:center;font-size:12px;color:rgba(255,255,255,0.5)"><span id="vol-val">80%</span></div>
</div>

<!-- ── START MENU ─────────────────────────────────────────────── -->
<div id="start-menu">
  <div class="sm-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="sm-input" placeholder="Search apps…" autocomplete="off" spellcheck="false">
  </div>
  <div class="sm-label">Apps</div>
  <div class="sm-grid" id="sm-grid"></div>
  <div class="sm-footer">
    <div class="sm-user">
      <div class="sm-avatar" id="sm-av"></div>
      <span id="sm-uname">User</span>
    </div>
    <div class="sm-btns">
      <div class="sm-btn" id="sm-lock" title="Lock"></div>
      <div class="sm-btn" id="sm-restart" title="Restart"></div>
      <div class="sm-btn" id="sm-power" title="Power"></div>
    </div>
  </div>
</div>

<!-- ── CONTEXT MENU ───────────────────────────────────────────── -->
<div id="ctx" class="ctx-menu" style="display:none"></div>

<!-- ── TOASTS ─────────────────────────────────────────────────── -->
<div id="toasts"></div>

<!-- ── SCRIPTS: load order matters ───────────────────────────── -->
<!-- PeerJS for P2P social network -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<!-- Core modules -->
<script src="./js/icons.js"></script>
<script src="./js/core.js"></script>
<script src="./js/wm.js"></script>
<script src="./js/ui.js"></script>

<!-- App modules -->
<script src="./js/apps/explorer.js"></script>
<script src="./js/apps/notepad.js"></script>
<script src="./js/apps/vscode.js"></script>
<script src="./js/apps/media.js"></script>
<script src="./js/apps/terminal.js"></script>
<script src="./js/apps/calculator.js"></script>
<script src="./js/apps/clock.js"></script>
<script src="./js/apps/settings.js"></script>
<script src="./js/apps/social.js"></script>
<script src="./js/apps/resmon.js"></script>

<!-- Boot (desktop build, start menu, initialization) -->
<script src="./js/boot.js"></script>

</body>
</html>
