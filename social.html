<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HueBit Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0b09;
  --surface:#121009;
  --elevated:#1c1912;
  --overlay:#23201a;
  --accent:#c8845a;
  --accent-2:#dfa070;
  --accent-glow:rgba(200,132,90,.2);
  --accent-dim:rgba(200,132,90,.1);
  --green:#5cbf8a;
  --red:#e07070;
  --text:#ede8de;
  --text-dim:rgba(237,232,222,.58);
  --text-faint:rgba(237,232,222,.3);
  --border:rgba(255,230,190,.07);
  --border-hi:rgba(255,230,190,.12);
  --bubble-sent:#162336;
  --bubble-recv:#201e14;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'Cascadia Code','Consolas',monospace;
}

html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,225,180,.1);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,225,180,.18)}

/* ─── Layout ─────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ─── Sidebar ────────────────────────── */
.sidebar{
  width:320px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}

.sb-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 14px 12px;
  background:var(--elevated);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.my-av{
  width:42px;height:42px;border-radius:50%;
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;
  user-select:none;overflow:hidden;
  transition:transform .15s,box-shadow .2s;
  box-shadow:0 0 0 2px transparent;
}
.my-av:hover{transform:scale(1.06);box-shadow:0 0 0 2px var(--accent)}
.my-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

.my-info{flex:1;min-width:0}
.my-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.my-status{font-size:11px;color:var(--text-faint);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .15s}
.my-status:hover{color:var(--accent)}

.sb-btns{display:flex;gap:2px}
.icon-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;
  transition:background .12s,color .12s;
}
.icon-btn:hover{background:rgba(255,225,180,.07);color:var(--text)}

.sb-search{
  padding:9px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.search-row{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,225,180,.04);
  border:1px solid var(--border);
  border-radius:22px;padding:7px 13px;
  transition:border-color .15s;
}
.search-row:focus-within{border-color:rgba(200,132,90,.3)}
.search-inp{background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none;flex:1}
.search-inp::placeholder{color:var(--text-faint)}

.chat-list{flex:1;overflow-y:auto;padding-bottom:4px}

.chat-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 14px;cursor:pointer;
  transition:background .12s;
  position:relative;user-select:none;
}
.chat-item:hover{background:rgba(255,225,180,.03)}
.chat-item.active{background:rgba(200,132,90,.09)}
.chat-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:52%;
  background:var(--accent);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px var(--accent-glow);
}

.ci-av{
  width:46px;height:46px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;
  position:relative;user-select:none;overflow:hidden;
}
.ci-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ci-dot{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface);
  transition:opacity .3s;
}
.ci-av.offline .ci-dot{display:none}

.ci-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.ci-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.ci-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-time{font-size:11px;color:var(--text-faint);flex-shrink:0}
.ci-bot{display:flex;align-items:center;justify-content:space-between;gap:4px}
.ci-preview{font-size:12px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ci-badge{
  flex-shrink:0;min-width:18px;height:18px;border-radius:99px;
  background:var(--accent);color:var(--bg);
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;
}

.new-chat-btn{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;cursor:pointer;
  color:var(--accent);font-size:13px;font-weight:700;
  transition:background .12s;
  border-top:1px solid var(--border);margin-top:4px;
}
.new-chat-btn:hover{background:var(--accent-dim)}
.new-chat-icon{
  width:38px;height:38px;border-radius:50%;
  background:var(--accent-dim);border:1.5px dashed rgba(200,132,90,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}

.empty-list{padding:28px 20px;text-align:center;color:var(--text-faint);font-size:13px;line-height:1.7}

/* ─── Chat panel ──────────────────────── */
.chat-panel{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;position:relative;
}
.chat-panel::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 55% at 50% 30%,rgba(200,132,90,.025) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* No chat */
.no-chat{
  position:absolute;inset:0;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
}
.no-chat-icon{
  width:68px;height:68px;border-radius:50%;
  background:var(--accent-dim);
  border:2px solid rgba(200,132,90,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  animation:floatBob 3.5s ease-in-out infinite;
}
@keyframes floatBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.no-chat-title{font-size:20px;font-weight:800}
.no-chat-sub{font-size:13px;color:var(--text-dim);text-align:center;max-width:215px;line-height:1.65}
.no-chat-action{
  margin-top:6px;padding:10px 24px;
  background:var(--accent);color:var(--bg);
  border:none;border-radius:22px;
  font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;
  box-shadow:0 4px 16px rgba(200,132,90,.3);
}
.no-chat-action:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 22px rgba(200,132,90,.4)}

/* Chat header */
.chat-header{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  background:var(--elevated);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:2;position:relative;
}
.back-btn{
  display:none;width:32px;height:32px;
  align-items:center;justify-content:center;
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  font-size:22px;border-radius:50%;transition:background .12s;flex-shrink:0;
}
.back-btn:hover{background:rgba(255,225,180,.07);color:var(--text)}
.ch-av{
  width:38px;height:38px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;overflow:hidden;
}
.ch-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-status{font-size:11.5px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.ch-status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7;flex-shrink:0}
.ch-status.online{color:var(--green)}
.ch-actions{display:flex;gap:2px}

/* Messages */
.messages-area{
  flex:1;overflow-y:auto;
  padding:14px 16px 8px;
  display:flex;flex-direction:column;
  gap:1px;z-index:1;position:relative;
}

.date-sep{display:flex;align-items:center;gap:10px;margin:10px 0;align-self:stretch}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.date-sep-lbl{font-size:11px;color:var(--text-faint);white-space:nowrap;padding:0 6px}

.msg-row{display:flex;margin-bottom:1px;animation:msgIn .18s cubic-bezier(.2,1,.3,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-row.sent{justify-content:flex-end}
.msg-row.recv{justify-content:flex-start}
.msg-row.sent+.msg-row.recv,.msg-row.recv+.msg-row.sent{margin-top:8px}

.bubble{
  display:inline-block;
  max-width:min(70%,400px);
  padding:7px 11px 5px;
  border-radius:14px;
  font-size:14.5px;line-height:1.5;
  word-break:break-word;white-space:pre-wrap;
}
.msg-row.sent .bubble{
  background:linear-gradient(145deg,var(--bubble-sent),#111d2e);
  border-bottom-right-radius:4px;
  border:1px solid rgba(56,100,180,.12);
  box-shadow:0 1px 4px rgba(0,0,0,.2),0 1px 2px rgba(200,132,90,.04);
}
.msg-row.sent.first .bubble{border-top-right-radius:14px}
.msg-row.recv .bubble{
  background:linear-gradient(145deg,var(--bubble-recv),#191710);
  border-bottom-left-radius:4px;
  border:1px solid rgba(255,225,180,.07);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.msg-row.recv.first .bubble{border-top-left-radius:14px}

/* Bubble footer — float trick so bubble hugs text width */
.bubble-foot{float:right;margin:2px -2px -2px 8px;display:flex;align-items:center;gap:3px}
.bubble-time{font-size:10.5px;color:var(--text-faint);white-space:nowrap}
.tick{font-size:12px;line-height:1}
.tick.queued{color:var(--text-faint)}
.tick.sent{color:var(--text-faint)}
.tick.delivered{color:var(--text-dim)}
.tick.read{color:var(--accent-2)}

/* Clearfix so bubble contains the float */
.bubble::after{content:'';display:table;clear:both}

.sys-msg{
  align-self:center;
  font-size:11.5px;color:var(--text-faint);
  background:rgba(255,225,180,.04);
  border-radius:99px;padding:4px 13px;
  margin:4px 0;
}

/* ─── Input bar ───────────────────────── */
.input-bar{
  display:flex;align-items:flex-end;gap:8px;
  padding:8px 12px 10px;
  background:var(--elevated);
  border-top:1px solid var(--border);
  flex-shrink:0;z-index:5;position:relative;
}

.emoji-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:transparent;color:var(--text-faint);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;flex-shrink:0;
  transition:color .12s,transform .1s;
}
.emoji-btn:hover{color:var(--accent);transform:scale(1.1)}

.ta-wrap{
  flex:1;display:flex;align-items:flex-end;
  background:rgba(255,225,180,.05);
  border:1px solid var(--border);
  border-radius:22px;padding:7px 14px;
  transition:border-color .15s;
}
.ta-wrap:focus-within{border-color:rgba(200,132,90,.35)}
.msg-ta{
  flex:1;background:none;border:none;
  color:var(--text);font-family:var(--font);
  font-size:14px;outline:none;resize:none;
  max-height:110px;line-height:1.45;
}
.msg-ta::placeholder{color:var(--text-faint)}

@supports (-webkit-touch-callout: none){
  .modal-inp,.search-inp,.msg-ta{font-size:16px!important}
}

.send-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;color:var(--bg);
  box-shadow:0 2px 12px rgba(200,132,90,.28);
}
.send-btn:hover:not(:disabled){filter:brightness(1.1);transform:scale(1.07)}
.send-btn:active:not(:disabled){transform:scale(0.95)}
.send-btn:disabled{background:rgba(255,225,180,.08);cursor:default;color:var(--text-faint);box-shadow:none}

/* ─── Emoji picker ────────────────────── */
.emoji-picker{
  position:absolute;bottom:62px;left:10px;
  width:272px;
  background:var(--overlay);
  border:1px solid var(--border-hi);
  border-radius:14px;padding:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.55);
  z-index:20;display:none;
}
.emoji-picker.open{display:block;animation:emPop .15s cubic-bezier(.2,1,.3,1)}
@keyframes emPop{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
.em-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:1px}
.em{
  font-size:20px;text-align:center;padding:4px 0;
  cursor:pointer;border-radius:7px;
  transition:background .1s,transform .1s;
  user-select:none;
}
.em:hover{background:rgba(255,225,180,.08);transform:scale(1.2)}

/* ─── Modals ──────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.75);backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;animation:ovIn .15s ease;
}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.overlay.hidden{display:none}

.modal{
  background:var(--overlay);
  border:1px solid var(--border-hi);
  border-radius:20px;padding:24px;
  width:100%;max-width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.65);
  animation:modIn .22s cubic-bezier(.2,1.15,.3,1);
}
@keyframes modIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}

.modal-title{font-size:18px;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text-dim);margin-bottom:20px;line-height:1.55}

.field{margin-bottom:13px}
.field-lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:6px}
.modal-inp{
  width:100%;
  background:rgba(255,225,180,.04);
  border:1px solid rgba(255,225,180,.1);
  border-radius:10px;color:var(--text);
  font-family:var(--font);font-size:13px;
  padding:10px 12px;outline:none;
  transition:border-color .15s,background .15s;
}
.modal-inp:focus{border-color:rgba(200,132,90,.45);background:rgba(200,132,90,.04)}
.modal-inp.mono{font-family:var(--mono);font-size:12px}

.peer-box{
  background:rgba(255,225,180,.04);
  border:1px solid rgba(255,225,180,.08);
  border-radius:10px;padding:10px 12px;
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;
}
.peer-val{flex:1;font-family:var(--mono);font-size:12px;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{
  background:var(--accent-dim);border:1px solid rgba(200,132,90,.25);
  border-radius:6px;color:var(--accent);
  font-size:11px;font-weight:700;padding:4px 9px;cursor:pointer;
  transition:all .15s;font-family:var(--font);
}
.copy-btn:hover{background:rgba(200,132,90,.22)}

.modal-btns{display:flex;gap:9px;margin-top:20px}
.mbtn{
  flex:1;padding:11px;border-radius:10px;border:none;
  font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.mbtn.primary{background:var(--accent);color:var(--bg)}
.mbtn.primary:hover{filter:brightness(1.1)}
.mbtn.secondary{background:rgba(255,225,180,.07);color:var(--text)}
.mbtn.secondary:hover{background:rgba(255,225,180,.12)}
.mbtn.danger{background:rgba(224,112,112,.12);color:var(--red);border:1px solid rgba(224,112,112,.2)}
.mbtn.danger:hover{background:rgba(224,112,112,.22)}

/* Profile avatar upload */
.p-av-area{display:flex;justify-content:center;margin-bottom:20px}
.p-av-wrap{position:relative;width:76px;height:76px;border-radius:50%;cursor:pointer}
.p-av-inner{
  width:100%;height:100%;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;color:#fff;overflow:hidden;
  transition:filter .15s;
}
.p-av-inner img{width:100%;height:100%;object-fit:cover}
.p-av-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;opacity:0;transition:opacity .15s;
}
.p-av-wrap:hover .p-av-overlay{opacity:1}
.p-av-wrap:hover .p-av-inner{filter:brightness(.65)}

.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.clr-sw{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .12s;
}
.clr-sw:hover{transform:scale(1.15)}
.clr-sw.active{border-color:#fff;transform:scale(1.1)}

/* ─── Toasts ──────────────────────────── */
#toasts{
  position:fixed;top:12px;right:12px;z-index:9999;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
}
.toast{
  background:var(--overlay);backdrop-filter:blur(12px);
  border:1px solid var(--border-hi);
  border-left:3px solid var(--accent);
  border-radius:10px;padding:10px 14px;
  min-width:180px;max-width:265px;
  box-shadow:0 8px 24px rgba(0,0,0,.45);
  pointer-events:auto;cursor:pointer;
  animation:toastIn .24s cubic-bezier(.2,1.2,.3,1);
}
.toast.warn{border-left-color:#f4b860}
.toast.error{border-left-color:var(--red)}
.toast-title{font-size:12px;font-weight:700;margin-bottom:2px}
.toast-msg{font-size:11px;color:var(--text-dim)}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

/* ─── Mobile ──────────────────────────── */
@media(max-width:640px){
  html{font-size:16px}
  .sidebar{
    width:100%;position:absolute;inset:0;z-index:10;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.slide-out{transform:translateX(-100%)}
  .chat-panel{
    position:absolute;inset:0;z-index:10;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .chat-panel.slide-in{transform:none}
  .back-btn{display:flex!important}
  .bubble{max-width:82%;font-size:15px}

  /* Emoji picker full width on mobile */
  .emoji-picker{
    position:fixed;bottom:0;left:0;right:0;width:auto;
    border-radius:16px 16px 0 0;
    padding:12px 12px calc(12px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 30px rgba(0,0,0,.5);
  }
  .em-grid{grid-template-columns:repeat(8,1fr)}
  .em{font-size:22px;padding:6px 0}

  .input-bar{
    padding:8px 10px calc(10px + env(safe-area-inset-bottom));
    position:sticky;
    bottom:0;
    z-index:10;
    transition: transform 0.15s ease-out;
  }
  .chat-item{padding:11px 14px}
  .ci-av{width:50px;height:50px;font-size:18px}
}

@media(min-width:641px)and(max-width:900px){
  .sidebar{width:275px}
  .bubble{max-width:74%}
}

@media(min-width:1200px){
  .sidebar{width:350px}
  .bubble{max-width:min(62%,440px);font-size:15px}
  .messages-area{padding:16px 22px 10px}
  .ch-name{font-size:16px}
  .ci-name{font-size:15px}
  .my-name{font-size:15px}
}

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
'use strict';

/* ── OS bridge ─────────────────────────────────── */
let _osUser = 'User', _osAccent = '#c8845a';
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'os-init') return;
  if (e.data.username) _osUser = e.data.username;
  if (e.data.accent)   _osAccent = e.data.accent;
  const saved = loadProfile();
  if (!saved || saved.name === 'User' || saved.name === 'Anonymous') {
    profile.name  = _osUser;
    profile.color = _osAccent;
    saveProfile(profile);
    updateSidebarProfile();
  }
});

/* ── Constants ─────────────────────────────────── */
const LS_PROFILE  = 'huebit-profile-v3';
const LS_PEERID   = 'huebit-peerid-v1';
const LS_CONTACTS = 'huebit-contacts-v1';
const LS_CONVS    = 'huebit-convs-v1';
const LS_PEERS    = 'huebit-peers-v1';
const LS_QUEUE    = 'huebit-queue-v1';
const MAX_MSG     = 200;
const ACCENT_COLORS = ['#c8845a','#d96f6f','#5f9ee8','#5cc08a','#9b76d4','#c9aa4f'];
const EMOJIS = [
  '😀','😂','🥲','😊','😍','🥰','😎','🤔',
  '😅','😭','😤','🤯','😴','🤗','🥳','😈',
  '💀','🫡','😏','🙃','😬','🫠','😇','🤩',
  '👍','👎','👏','🙏','🤝','👋','🫶','💪',
  '❤️','🔥','💯','✨','🎉','⭐','🌈','💔',
  '🥺','😡','😂','🤣','💀','🫣','🤭','😮',
  '🍕','🍔','☕','🍜','🍣','🍦','🎂','🍺',
  '🎵','🎮','📱','💻','🌙','🏆','🚀','💡',
];

/* ── Storage ────────────────────────────────────── */
const ls = {
  get: k  => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  str: k  => localStorage.getItem(k) || null,
  setStr: (k,v) => { try { localStorage.setItem(k, v); } catch {} },
};
const loadProfile   = () => ls.get(LS_PROFILE);
const saveProfile   = p  => ls.set(LS_PROFILE, p);
const loadPeerId    = () => ls.str(LS_PEERID);
const savePeerId    = id => ls.setStr(LS_PEERID, id);
const loadContacts  = () => ls.get(LS_CONTACTS) || {};
const saveContacts  = c  => ls.set(LS_CONTACTS, c);
const loadAllConvs  = () => ls.get(LS_CONVS) || {};
const saveConv      = (pid, msgs) => {
  const all = loadAllConvs();
  all[pid]  = msgs.slice(-MAX_MSG);
  ls.set(LS_CONVS, all);
};
const getConv       = pid => loadAllConvs()[pid] || [];
const loadKnownPeers= () => ls.get(LS_PEERS) || [];
const saveKnownPeers= () => ls.set(LS_PEERS, [...knownPeers]);
const loadSavedQueue= () => ls.get(LS_QUEUE) || {};
const savePendingQueue = () => {
  const obj = {};
  pendingQueue.forEach((msgs, pid) => { if (msgs.length) obj[pid] = msgs; });
  ls.set(LS_QUEUE, obj);
};

/* ── State ──────────────────────────────────────── */
let peer         = null;
let connections  = new Map();   // pid → DataConnection
let knownPeers   = new Set();
let peerProfiles = new Map();   // pid → {name, color}
let peerPhotos   = new Map();   // pid → dataURL
let activeChat   = null;
let unread       = new Map();
let myPeerId     = null;
let searchQ      = '';
let profile      = loadProfile() || { name: 'User', color: '#c8845a', photo: null };
let renameTarget = null;
let pendingQueue = new Map();   // pid → [msg]
let emojiOpen    = false;

/* ── Utils ──────────────────────────────────────── */
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function timeStr(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}
function dateLabel(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Today';
  if (d.toDateString() === new Date(Date.now() - 86400000).toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}
function initials(name) {
  return String(name || '?').trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}
function getPeerName(pid) {
  const c = loadContacts()[pid];
  if (c?.label) return c.label;
  const pp = peerProfiles.get(pid);
  if (pp?.name) return pp.name;
  return pid.slice(0, 8) + '…';
}
function getPeerColor(pid) {
  return peerProfiles.get(pid)?.color || '#6b7280';
}
function getPeerPhoto(pid) {
  return peerPhotos.get(pid) || null;
}
function isOnline(pid) {
  const c = connections.get(pid);
  return !!(c && c.open);
}

function buildAvHTML(name, color, photo) {
  if (photo) return `<img src="${esc(photo)}" alt="${esc(initials(name))}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  return `<span style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:50%;background:${esc(color)};font-weight:800;color:#fff">${esc(initials(name))}</span>`;
}

/* ── Toast ──────────────────────────────────────── */
function toast(title, msg, type = '') {
  const wrap = document.getElementById('toasts');
  const el   = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.innerHTML = `<div class="toast-title">${esc(title)}</div>${msg ? `<div class="toast-msg">${esc(msg)}</div>` : ''}`;
  wrap.appendChild(el);
  el.onclick = () => el.remove();
  setTimeout(() => {
    el.style.transition = 'opacity .2s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 200);
  }, 3200);
}

/* ── Tick/status ────────────────────────────────── */
function tickHTML(status) {
  switch (status) {
    case 'queued':    return '<span class="tick queued" title="Queued — will send when online">○</span>';
    case 'sent':      return '<span class="tick sent" title="Sent">✓</span>';
    case 'delivered': return '<span class="tick delivered" title="Delivered">✓✓</span>';
    case 'read':      return '<span class="tick read" title="Read">✓✓</span>';
    default:          return '<span class="tick sent">✓</span>';
  }
}

function updateMsgStatus(pid, msgId, newStatus) {
  const ORDER = ['queued', 'sent', 'delivered', 'read'];
  const msgs  = getConv(pid);
  const msg   = msgs.find(m => m.id === msgId);
  if (!msg) return;
  const ci = ORDER.indexOf(msg.status || 'sent');
  const ni = ORDER.indexOf(newStatus);
  if (ni > ci) {
    msg.status = newStatus;
    saveConv(pid, msgs);
    if (activeChat === pid) renderMessages(pid);
  }
}

function markAllRead(pid, upToTs) {
  const ORDER = ['queued', 'sent', 'delivered', 'read'];
  const msgs  = getConv(pid);
  let changed = false;
  msgs.forEach(m => {
    if (m.from !== myPeerId || m.ts > upToTs) return;
    const ci = ORDER.indexOf(m.status || 'sent');
    if (ci < ORDER.indexOf('read')) { m.status = 'read'; changed = true; }
  });
  if (changed) {
    saveConv(pid, msgs);
    if (activeChat === pid) renderMessages(pid);
  }
}

/* ── Pending queue ──────────────────────────────── */
function initQueue() {
  const saved = loadSavedQueue();
  Object.entries(saved).forEach(([pid, msgs]) => {
    if (msgs && msgs.length) pendingQueue.set(pid, msgs);
  });
}

function enqueueMsg(pid, msg) {
  if (!pendingQueue.has(pid)) pendingQueue.set(pid, []);
  pendingQueue.get(pid).push(msg);
  savePendingQueue();
}

function flushQueue(pid) {
  const queue = pendingQueue.get(pid);
  if (!queue || !queue.length) return;
  const conn = connections.get(pid);
  if (!conn || !conn.open) return;

  const toSend = [...queue];
  pendingQueue.set(pid, []);
  savePendingQueue();

  let sent = 0;
  const conv = getConv(pid);
  const convIds = new Set(conv.map(m => m.id));

  toSend.forEach(msg => {
    try {
      conn.send({ type: 'chat', msg });
      msg.status = 'sent';
      if (!convIds.has(msg.id)) {
        conv.push(msg);
        convIds.add(msg.id);
      } else {
        const existing = conv.find(m => m.id === msg.id);
        if (existing) existing.status = 'sent';
      }
      sent++;
    } catch {
      msg.status = 'queued';
      enqueueMsg(pid, msg);
    }
  });

  if (sent > 0) {
    saveConv(pid, conv);
    toast(getPeerName(pid), `${sent} queued message${sent > 1 ? 's' : ''} sent!`);
    renderMessages(pid);
    renderChatList();
  }
}

/* ── Chat list ──────────────────────────────────── */
function getChatPeers() {
  const ids = new Set([...Object.keys(loadContacts()), ...connections.keys()]);
  return [...ids];
}

function renderChatList() {
  const listEl = document.getElementById('chat-list');
  if (!listEl) return;
  const peers = getChatPeers();
  const q     = searchQ.toLowerCase().trim();
  listEl.innerHTML = '';

  let filtered = peers.filter(pid =>
    !q || getPeerName(pid).toLowerCase().includes(q) || pid.toLowerCase().includes(q)
  );

  if (!filtered.length && !q) {
    listEl.innerHTML = `<div class="empty-list">No contacts yet.<br>Tap <strong>✎</strong> to start chatting!</div>`;
  }

  filtered.sort((a, b) => {
    const ao = isOnline(a), bo = isOnline(b);
    if (ao !== bo) return ao ? -1 : 1;
    const at = getConv(a).slice(-1)[0]?.ts || 0;
    const bt = getConv(b).slice(-1)[0]?.ts || 0;
    return bt - at;
  });

  filtered.forEach(pid => {
    const name   = getPeerName(pid);
    const color  = getPeerColor(pid);
    const photo  = getPeerPhoto(pid);
    const online = isOnline(pid);
    const msgs   = getConv(pid).filter(m => !m.system);
    const queued = (pendingQueue.get(pid) || []).length;
    const last   = msgs.slice(-1)[0];
    const ub     = unread.get(pid) || 0;

    let preview = 'Tap to chat';
    if (last) {
      preview = (last.from === myPeerId ? '✓ ' : '') + last.text;
    } else if (online) {
      preview = '🔗 Connected';
    } else if (queued) {
      preview = `⏳ ${queued} message${queued > 1 ? 's' : ''} queued`;
    }

    const el = document.createElement('div');
    el.className = 'chat-item' + (activeChat === pid ? ' active' : '');
    el.dataset.pid = pid;
    el.innerHTML = `
      <div class="ci-av ${online ? '' : 'offline'}" style="${photo ? '' : 'background:' + esc(color)}">
        ${buildAvHTML(name, color, photo)}
        ${online ? '<span class="ci-dot"></span>' : ''}
      </div>
      <div class="ci-body">
        <div class="ci-top">
          <span class="ci-name">${esc(name)}</span>
          <span class="ci-time">${last ? timeStr(last.ts) : ''}</span>
        </div>
        <div class="ci-bot">
          <span class="ci-preview">${esc(preview)}</span>
          ${ub > 0 ? `<span class="ci-badge">${ub}</span>` : ''}
        </div>
      </div>`;
    el.addEventListener('click', () => openChat(pid));
    listEl.appendChild(el);
  });

  const btn = document.createElement('div');
  btn.className = 'new-chat-btn';
  btn.innerHTML = `<div class="new-chat-icon">+</div><span>New Chat</span>`;
  btn.addEventListener('click', showConnectModal);
  listEl.appendChild(btn);
}

/* ── Open / close chat ──────────────────────────── */
function openChat(pid) {
  activeChat = pid;
  unread.set(pid, 0);

  // Send read receipt
  const conn = connections.get(pid);
  if (conn && conn.open) {
    try { conn.send({ type: 'read', upToTs: Date.now() }); } catch {}
  }

  renderChatList();
  renderMessages(pid);

  document.getElementById('no-chat').style.display      = 'none';
  document.getElementById('chat-header').style.display  = '';
  document.getElementById('messages-area').style.display = '';
  document.getElementById('input-bar').style.display    = '';

  // Update header
  updateChatHeader(pid);

  document.getElementById('chat-panel').classList.add('slide-in');
  document.getElementById('sidebar').classList.add('slide-out');
  // Solo autofocus en desktop; en móvil el usuario toca cuando quiere escribir
  if (window.innerWidth > 640) {
    setTimeout(() => document.getElementById('msg-ta').focus(), 100);
  }
  try { window.parent?.postMessage({ type: 'chat-open', pid }, '*'); } catch {}
}

function updateChatHeader(pid) {
  if (!pid) return;
  const name   = getPeerName(pid);
  const color  = getPeerColor(pid);
  const photo  = getPeerPhoto(pid);
  const online = isOnline(pid);

  const chAv = document.getElementById('ch-av');
  chAv.style.background = photo ? 'transparent' : color;
  chAv.innerHTML = buildAvHTML(name, color, photo);

  document.getElementById('ch-name').textContent = name;
  const stEl = document.getElementById('ch-status');
  stEl.textContent = online ? 'online' : 'offline';
  stEl.className   = 'ch-status' + (online ? ' online' : '');
}

function closeChat() {
  activeChat = null;
  document.getElementById('no-chat').style.display      = '';
  document.getElementById('chat-header').style.display  = 'none';
  document.getElementById('messages-area').style.display = 'none';
  document.getElementById('input-bar').style.display    = 'none';
  document.getElementById('chat-panel').classList.remove('slide-in');
  document.getElementById('sidebar').classList.remove('slide-out');
  closeEmojiPicker();
  renderChatList();
}

/* ── Render messages ────────────────────────────── */
function renderMessages(pid) {
  const area = document.getElementById('messages-area');
  if (!area) return;

  const conv    = getConv(pid);
  const queued  = (pendingQueue.get(pid) || []).map(m => ({ ...m, status: 'queued' }));
  const allMsgs = [...conv, ...queued].sort((a, b) => a.ts - b.ts);
  const realMsgs = allMsgs.filter(m => !m.system);

  // Save scroll position to decide if we should auto-scroll
  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

  area.innerHTML = '';

  if (!realMsgs.length) {
    const sys = document.createElement('div');
    sys.className = 'sys-msg';
    sys.textContent = isOnline(pid)
      ? '🔗 Connected — say hello!'
      : '📵 Peer offline — messages will send when they reconnect.';
    area.appendChild(sys);
    return;
  }

  let lastDate = null, prevFrom = null;

  allMsgs.forEach(m => {
    const label = dateLabel(m.ts);
    if (label !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.innerHTML = `<span class="date-sep-lbl">${esc(label)}</span>`;
      area.appendChild(sep);
      lastDate = label; prevFrom = null;
    }

    if (m.system) {
      const s = document.createElement('div');
      s.className = 'sys-msg'; s.textContent = m.text;
      area.appendChild(s); prevFrom = null; return;
    }

    const isMine  = m.from === myPeerId;
    const isFirst = m.from !== prevFrom;
    prevFrom = m.from;

    const row = document.createElement('div');
    row.className = `msg-row ${isMine ? 'sent' : 'recv'}${isFirst ? ' first' : ''}`;
    row.innerHTML = `<div class="bubble">${esc(m.text)}<span class="bubble-foot"><span class="bubble-time">${timeStr(m.ts)}</span>${isMine ? tickHTML(m.status || 'sent') : ''}</span></div>`;
    area.appendChild(row);
  });

  if (wasAtBottom) area.scrollTop = area.scrollHeight;
}

/* ── Send message ───────────────────────────────── */
function sendMessage(text) {
  text = text.trim();
  if (!text || !activeChat) return;

  const msg = {
    id: crypto.randomUUID(),
    from: myPeerId,
    text,
    ts: Date.now(),
    status: 'queued',
  };

  const conn    = connections.get(activeChat);
  const canSend = conn && conn.open;

  if (canSend) {
    try {
      conn.send({ type: 'chat', msg });
      msg.status = 'sent';
    } catch {
      msg.status = 'queued';
    }
  }

  if (msg.status === 'queued') {
    enqueueMsg(activeChat, msg);
  } else {
    const msgs = getConv(activeChat);
    msgs.push(msg);
    saveConv(activeChat, msgs);
  }

  renderMessages(activeChat);
  renderChatList();
}

/* ── PeerJS ─────────────────────────────────────── */
function addKnownPeer(id) {
  if (!id || id === myPeerId || knownPeers.has(id)) return;
  knownPeers.add(id); saveKnownPeers();
}

function handleData(conn, data) {
  if (!data?.type) return;
  const pid = conn.peer;

  switch (data.type) {
    case 'chat': {
      const msg = data.msg;
      if (!msg?.text || !msg?.ts) return;
      msg.from = pid;
      const msgs = getConv(pid);
      if (msgs.find(m => m.id === msg.id)) return; // dedup
      msgs.push(msg);
      saveConv(pid, msgs);

      // Send delivery receipt
      if (conn.open) {
        try { conn.send({ type: 'receipt', msgId: msg.id }); } catch {}
        if (activeChat === pid) {
          try { conn.send({ type: 'read', upToTs: Date.now() }); } catch {}
        }
      }

      if (activeChat === pid) {
        renderMessages(pid);
      } else {
        unread.set(pid, (unread.get(pid) || 0) + 1);
        toast(getPeerName(pid), msg.text);
      }
      renderChatList();
      break;
    }
    case 'receipt': {
      if (data.msgId) updateMsgStatus(pid, data.msgId, 'delivered');
      break;
    }
    case 'read': {
      if (data.upToTs) markAllRead(pid, data.upToTs);
      break;
    }
    case 'profile': {
      peerProfiles.set(pid, { name: data.name, color: data.color });
      if (data.photo !== undefined) {
        peerPhotos.set(pid, data.photo || null);
      }
      // Update contact label if not manually set
      const c = loadContacts();
      if (c[pid] && !c[pid].hadCustomLabel) {
        c[pid].label = data.name; saveContacts(c);
      }
      renderChatList();
      if (activeChat === pid) updateChatHeader(pid);
      break;
    }
  }
}

function sendMyProfile(conn) {
  if (!conn || !conn.open) return;
  try {
    conn.send({ type: 'profile', name: profile.name, color: profile.color, photo: profile.photo || null });
  } catch {}
}

function setupConn(conn) {
  conn.on('open', () => {
    connections.set(conn.peer, conn);
    addKnownPeer(conn.peer);
    sendMyProfile(conn);

    // Ensure in contacts
    const c = loadContacts();
    if (!c[conn.peer]) {
      c[conn.peer] = { label: conn.peer.slice(0, 8) + '…', addedAt: Date.now() };
      saveContacts(c);
    }

    // System message
    const msgs = getConv(conn.peer);
    msgs.push({ id: crypto.randomUUID(), from: '__sys', text: '🔗 Connected', ts: Date.now(), system: true });
    saveConv(conn.peer, msgs);

    // Flush pending queue after brief delay
    setTimeout(() => {
      flushQueue(conn.peer);
      // segundo intento por si la conexión WebRTC tardó en estabilizarse
      setTimeout(() => flushQueue(conn.peer), 1200);
    }, 600);

    renderChatList();
    if (activeChat === conn.peer) { renderMessages(conn.peer); updateChatHeader(conn.peer); }
    toast(getPeerName(conn.peer), 'Connected!');
    try { window.parent?.postMessage({ type: 'chat-connected', peers: connections.size }, '*'); } catch {}
  });

  conn.on('data', data => handleData(conn, data));

  conn.on('close', () => {
    connections.delete(conn.peer);
    const msgs = getConv(conn.peer);
    msgs.push({ id: crypto.randomUUID(), from: '__sys', text: '📵 Disconnected', ts: Date.now(), system: true });
    saveConv(conn.peer, msgs);
    renderChatList();
    if (activeChat === conn.peer) { renderMessages(conn.peer); updateChatHeader(conn.peer); }
  });

  conn.on('error', () => {
    connections.delete(conn.peer);
    renderChatList();
    if (activeChat === conn.peer) updateChatHeader(conn.peer);
  });

  // Also watch the underlying WebRTC connection state for ungraceful disconnects
  try {
    const pc = conn.peerConnection;
    if (pc) {
      pc.addEventListener('connectionstatechange', () => {
        const s = pc.connectionState;
        if (s === 'disconnected' || s === 'failed' || s === 'closed') {
          if (connections.has(conn.peer)) {
            connections.delete(conn.peer);
            renderChatList();
            if (activeChat === conn.peer) updateChatHeader(conn.peer);
          }
        }
      });
    }
  } catch {}
}

function connectToPeer(pid, customLabel) {
  if (!peer || !pid || pid === myPeerId) return;
  if (isOnline(pid)) { toast('Chat', 'Already connected to this peer', 'warn'); return; }
  if (connections.has(pid)) return; // pendiente de abrir, evita duplicados
  addKnownPeer(pid);
  if (customLabel) {
    const c = loadContacts();
    if (!c[pid]) c[pid] = { label: customLabel, addedAt: Date.now(), hadCustomLabel: true };
    saveContacts(c);
  }
  const conn = peer.connect(pid, { reliable: true });
  setupConn(conn);
}

function initPeer() {
  if (typeof Peer === 'undefined') {
    document.getElementById('sb-peer-id').textContent = 'PeerJS unavailable';
    return;
  }
  const stored = loadPeerId();
  peer = stored ? new Peer(stored) : new Peer();

  peer.on('open', id => {
    myPeerId = id; savePeerId(id);
    document.getElementById('sb-peer-id').textContent = id.slice(0, 16) + '…';
    document.getElementById('m-my-id').textContent    = id;
    document.getElementById('p-my-id').textContent    = id;
    // Reconnect saved contacts
    const c = loadContacts();
    Object.keys(c).forEach(pid => { if (pid && pid !== id) connectToPeer(pid); });
  });

  peer.on('connection', conn => {
    // Glare resolution: si ya hay una conexión saliente pendiente o abierta,
    // el que tiene el ID lexicográficamente menor cede y cierra la suya.
    if (connections.has(conn.peer)) {
      const existing = connections.get(conn.peer);
      if (existing && !existing.open) {
        // Tenemos una oferta saliente sin abrir aún
        if (myPeerId < conn.peer) {
          // Yo cedo: cierro la mía y acepto la entrante
          try { existing.close(); } catch {}
          connections.delete(conn.peer);
          setupConn(conn);
        }
        // Si myPeerId > conn.peer, ignoro la entrante (el otro cederá)
      }
      return;
    }
    setupConn(conn);
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      peer = new Peer();
      peer.on('open', id => {
        myPeerId = id; savePeerId(id);
        document.getElementById('sb-peer-id').textContent = id.slice(0, 16) + '…';
        document.getElementById('m-my-id').textContent    = id;
        document.getElementById('p-my-id').textContent    = id;
      });
      peer.on('connection', conn => setupConn(conn));
    }
  });
}

/* ── Profile UI ─────────────────────────────────── */
function renderMyAvatar(el, name, color, photo) {
  if (!el) return;
  if (photo) {
    el.innerHTML = `<img src="${esc(photo)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    el.style.background = 'transparent';
  } else {
    el.style.background = color || '#c8845a';
    el.innerHTML = esc(initials(name || 'Me'));
  }
}

function updateSidebarProfile() {
  renderMyAvatar(document.getElementById('sb-my-av'), profile.name, profile.color, profile.photo);
  const nm = document.getElementById('sb-my-name');
  if (nm) nm.textContent = profile.name || 'Me';
}

function updateProfileModalAvatar() {
  const inner = document.getElementById('p-av-inner');
  if (!inner) return;
  if (profile.photo) {
    inner.innerHTML = `<img src="${esc(profile.photo)}" style="width:100%;height:100%;object-fit:cover">`;
    inner.style.background = 'transparent';
  } else {
    inner.style.background = profile.color || '#c8845a';
    inner.innerHTML = esc(initials(profile.name || 'Me'));
  }
}

function renderColorSwatches() {
  const el = document.getElementById('p-colors');
  if (!el) return;
  el.innerHTML = '';
  ACCENT_COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'clr-sw' + (profile.color === c ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => { profile.color = c; renderColorSwatches(); updateSidebarProfile(); updateProfileModalAvatar(); };
    el.appendChild(sw);
  });
}

function compressImage(file, maxDim, quality, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale  = Math.min(maxDim / img.width, maxDim / img.height, 1);
      canvas.width  = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── Emoji picker ───────────────────────────────── */
function buildEmojiPicker() {
  const grid = document.getElementById('em-grid');
  if (!grid) return;
  grid.innerHTML = '';
  EMOJIS.forEach(em => {
    const el = document.createElement('span');
    el.className = 'em'; el.textContent = em;
    el.addEventListener('click', e => { e.stopPropagation(); insertEmoji(em); closeEmojiPicker(); });
    grid.appendChild(el);
  });
}

function insertEmoji(em) {
  const ta = document.getElementById('msg-ta');
  const s  = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, s) + em + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = s + em.length;
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

function toggleEmojiPicker(e) {
  e.stopPropagation();
  emojiOpen = !emojiOpen;
  document.getElementById('emoji-picker').classList.toggle('open', emojiOpen);
}

function closeEmojiPicker() {
  emojiOpen = false;
  document.getElementById('emoji-picker')?.classList.remove('open');
}

/* ── Modals ─────────────────────────────────────── */
function showConnectModal() {
  document.getElementById('connect-modal').classList.remove('hidden');
  document.getElementById('m-peer-inp').value = '';
  document.getElementById('m-name-inp').value = '';
  setTimeout(() => document.getElementById('m-peer-inp').focus(), 50);
}
function hideConnectModal() { document.getElementById('connect-modal').classList.add('hidden'); }

function showProfileModal() {
  document.getElementById('p-name-inp').value = profile.name || '';
  renderColorSwatches();
  updateProfileModalAvatar();
  document.getElementById('profile-modal').classList.remove('hidden');
}
function hideProfileModal() { document.getElementById('profile-modal').classList.add('hidden'); }

function showRenameModal(pid) {
  renameTarget = pid;
  const c = loadContacts();
  document.getElementById('rn-inp').value = c[pid]?.label || getPeerName(pid);
  document.getElementById('rename-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('rn-inp').focus(), 50);
}
function hideRenameModal() { document.getElementById('rename-modal').classList.add('hidden'); renameTarget = null; }

/* ── DOM Ready ──────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  profile    = loadProfile() || { name: 'User', color: '#c8845a', photo: null };
  knownPeers = new Set(loadKnownPeers());
  initQueue();
  updateSidebarProfile();
  renderChatList();
  buildEmojiPicker();
  initPeer();

  // Close emoji on outside click
  document.addEventListener('click', e => {
    if (emojiOpen && !e.target.closest('#emoji-picker') && !e.target.closest('#emoji-btn')) {
      closeEmojiPicker();
    }
  });

  // ── Sidebar ──
  document.getElementById('sb-my-av').addEventListener('click', showProfileModal);
  document.getElementById('sb-profile-btn').addEventListener('click', showProfileModal);
  document.getElementById('sb-new-btn').addEventListener('click', showConnectModal);
  document.getElementById('nc-new-btn').addEventListener('click', showConnectModal);
  document.getElementById('sb-peer-id').addEventListener('click', () => {
    if (myPeerId) { navigator.clipboard.writeText(myPeerId).catch(() => {}); toast('Chat', 'Peer ID copied!'); }
  });
  document.getElementById('search-inp').addEventListener('input', e => { searchQ = e.target.value; renderChatList(); });

  // ── Connect modal ──
  document.getElementById('m-cancel').addEventListener('click', hideConnectModal);
  document.getElementById('connect-modal').addEventListener('click', e => { if (e.target === e.currentTarget) hideConnectModal(); });
  document.getElementById('m-copy-id').addEventListener('click', () => {
    if (myPeerId) { navigator.clipboard.writeText(myPeerId).catch(() => {}); toast('Chat', 'Peer ID copied!'); }
  });
  function doConnect() {
    const pid  = document.getElementById('m-peer-inp').value.trim();
    const name = document.getElementById('m-name-inp').value.trim();
    if (!pid) { toast('Chat', 'Enter a peer ID', 'warn'); return; }
    const c = loadContacts();
    if (!c[pid]) c[pid] = { label: name || pid.slice(0, 8) + '…', addedAt: Date.now(), hadCustomLabel: !!name };
    saveContacts(c);
    connectToPeer(pid, name || null);
    hideConnectModal();
    renderChatList();
    openChat(pid);
  }
  document.getElementById('m-connect').addEventListener('click', doConnect);
  document.getElementById('m-connect').addEventListener('touchend', e => { e.preventDefault(); doConnect(); });
  document.getElementById('m-peer-inp').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('m-connect').click(); });

  // ── Profile modal ──
  document.getElementById('p-cancel').addEventListener('click', hideProfileModal);
  document.getElementById('profile-modal').addEventListener('click', e => { if (e.target === e.currentTarget) hideProfileModal(); });
  document.getElementById('p-copy-id').addEventListener('click', () => {
    if (myPeerId) { navigator.clipboard.writeText(myPeerId).catch(() => {}); toast('Chat', 'Peer ID copied!'); }
  });
  document.getElementById('p-av-wrap').addEventListener('click', () => {
    document.getElementById('p-photo-inp').click();
  });
  document.getElementById('p-photo-inp').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    compressImage(file, 200, 0.78, dataUrl => {
      profile.photo = dataUrl;
      updateProfileModalAvatar();
      updateSidebarProfile();
    });
    e.target.value = '';
  });
  document.getElementById('p-save').addEventListener('click', () => {
    const name = document.getElementById('p-name-inp').value.trim() || 'Anonymous';
    profile.name = name;
    saveProfile(profile);
    updateSidebarProfile();
    connections.forEach(conn => { if (conn.open) sendMyProfile(conn); });
    hideProfileModal();
    toast('Chat', 'Profile updated!');
  });

  // ── Rename modal ──
  document.getElementById('rn-cancel').addEventListener('click', hideRenameModal);
  document.getElementById('rename-modal').addEventListener('click', e => { if (e.target === e.currentTarget) hideRenameModal(); });
  document.getElementById('rn-save').addEventListener('click', () => {
    if (!renameTarget) return;
    const label = document.getElementById('rn-inp').value.trim();
    if (!label) return;
    const c = loadContacts();
    c[renameTarget] = { ...(c[renameTarget] || {}), label, hadCustomLabel: true };
    saveContacts(c);
    hideRenameModal(); renderChatList();
    if (activeChat === renameTarget) updateChatHeader(renameTarget);
    toast('Chat', 'Contact renamed!');
  });
  document.getElementById('rn-remove').addEventListener('click', () => {
    if (!renameTarget) return;
    const c = loadContacts(); delete c[renameTarget]; saveContacts(c);
    const pid = renameTarget; hideRenameModal();
    if (activeChat === pid) closeChat();
    renderChatList(); toast('Chat', 'Contact removed');
  });
  document.getElementById('rn-inp').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('rn-save').click(); });

  // ── Chat header ──
  document.getElementById('back-btn').addEventListener('click', closeChat);
  document.getElementById('ch-rename-btn').addEventListener('click', () => { if (activeChat) showRenameModal(activeChat); });

  // ── Emoji ──
  document.getElementById('emoji-btn').addEventListener('click', toggleEmojiPicker);

  // ── Textarea ──
  const ta      = document.getElementById('msg-ta');
  const sendBtn = document.getElementById('send-btn');

  ta.addEventListener('input', () => {
    sendBtn.disabled = !ta.value.trim();
    ta.style.height = '';
    ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) { sendMessage(ta.value); ta.value = ''; sendBtn.disabled = true; ta.style.height = ''; }
    }
  });
  sendBtn.addEventListener('click', () => {
    if (!sendBtn.disabled) { sendMessage(ta.value); ta.value = ''; sendBtn.disabled = true; ta.style.height = ''; }
  });

  // ── Anclar input-bar al teclado virtual en móvil ──
  if (window.visualViewport && window.innerWidth <= 640) {
    const inputBar = document.getElementById('input-bar');
    const msgsArea = document.getElementById('messages-area');

    function onViewportResize() {
      const vv = window.visualViewport;
      const keyboardHeight = window.innerHeight - vv.height - vv.offsetTop;
      const offset = Math.max(0, keyboardHeight);

      // Mueve el input-bar sobre el teclado
      inputBar.style.transform = `translateY(-${offset}px)`;

      // Ajusta el área de mensajes para no quedar tapada
      if (msgsArea) {
        msgsArea.style.paddingBottom = offset > 0 ? `${offset + 60}px` : '';
        if (offset > 0) msgsArea.scrollTop = msgsArea.scrollHeight;
      }
    }

    window.visualViewport.addEventListener('resize', onViewportResize);
    window.visualViewport.addEventListener('scroll', onViewportResize);
  }
});
</script>
